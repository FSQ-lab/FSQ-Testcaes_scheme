schemaVersion: fsq.ai-test/v1
name: Verify that each item in the second part of L1 page is accessible
description: Converted from Edge Android Behave BDD scenario.
platform: android
appId: com.microsoft.emmx
tags:
- p0
- codex-converted
---
- launchApp
- tapOn:
    target: Browser menu
    locator:
      resourceId: com.microsoft.emmx:id/overflow_button_bottom
- tapOn:
    target: Settings
    locator:
      xpath: "//android.widget.TextView[@text='Settings']"
- tapOn:
    target: Set as Default Browser section
    locator:
      xpath: "//android.widget.TextView[@text='Set as default browser' and contains(@resource-id, 'android:id/title')]"
- assertVisible:
    target: Set edge as your default browser app? dialog
    locator:
      xpath: "//android.widget.TextView[contains(@text, 'Set Edge') and contains(@text, 'as your default browser app?')]"
    optional: false
- tapOn:
    target: Cancel
    locator:
      xpath: "//android.widget.Button[@text='Cancel']"
- assertNotVisible:
    target: Dialog
    locator:
      xpath: "//android.widget.TextView[contains(@text, 'Set Edge')]"
    optional: false
- tapOn:
    target: Search section
    locator:
      xpath: "//android.widget.TextView[@text='Search']"
- assertVisible:
    target: Search page title
    locator:
      xpath: "//android.widget.TextView[@text='Search']"
    optional: false
- tapOn:
    target: Navigate up
    locator:
      accessibilityId: Navigate up
- tapOn:
    target: Appearance and layout
    locator:
      xpath: "//android.widget.TextView[@text='Appearance and layout']"
- assertVisible:
    target: Appearance and Layout page title
    locator:
      xpath: "//android.widget.TextView[@text='Appearance and layout']"
    optional: false
- tapOn:
    target: Navigate up
    locator:
      accessibilityId: Navigate up
- performActions:
  - type: pointer
    id: codex-scroll-up
    parameters:
      pointerType: touch
    actions:
    - type: pointerMove
      origin: viewport
      x: 540
      y: 1500
    - type: pointerDown
      button: 0
    - type: pointerMove
      origin: viewport
      x: 540
      y: 800
      duration: 2000
    - type: pointerUp
      button: 0
- tapOn:
    target: New Tab Page section
    locator:
      xpath: "//android.widget.TextView[@text='New tab page']"
- assertVisible:
    target: New Tab Page title
    locator:
      xpath: "//android.widget.TextView[@text='New tab page']"
    optional: false
- tapOn:
    target: Navigate up
    locator:
      accessibilityId: Navigate up
- performActions:
  - type: pointer
    id: codex-scroll-up
    parameters:
      pointerType: touch
    actions:
    - type: pointerMove
      origin: viewport
      x: 540
      y: 1500
    - type: pointerDown
      button: 0
    - type: pointerMove
      origin: viewport
      x: 540
      y: 800
      duration: 2000
    - type: pointerUp
      button: 0
- tapOn:
    target: Tabs section
    locator:
      xpath: "//android.widget.TextView[@text='Tabs']"
- assertVisible:
    target: Tabs page title
    locator:
      xpath: "//android.widget.TextView[contains(@text,'Tabs')]"
    optional: false
- tapOn:
    target: Navigate up
    locator:
      accessibilityId: Navigate up
- tapOn:
    target: Accessibility section
    locator:
      xpath: "//android.widget.TextView[@text='Accessibility']"
- assertVisible:
    target: Accessibility page title
    locator:
      xpath: "//android.widget.TextView[@text='Accessibility']"
    optional: false
- tapOn:
    target: Navigate up
    locator:
      accessibilityId: Navigate up
- tapOn:
    target: Navigate up
    locator:
      accessibilityId: Navigate up
- assertVisible:
    target: New Tab Page
    locator:
      accessibilityId: Account menu
    optional: false
- killApp
