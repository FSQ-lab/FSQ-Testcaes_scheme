schemaVersion: fsq.ai-test/v1
name: Verify that each item in the third part of L1 page is accessible
description: Converted from Edge Android Behave BDD scenario.
platform: android
appId: com.microsoft.emmx
tags:
- p0
- codex-converted
---
- launchApp
- tapOn:
    target: Browser menu
- tapOn:
    target: Settings
    locator:
      xpath: "//android.widget.TextView[@text='Settings']"
- swipe:
    direction: up
    duration: 500
- tapOn:
    target: Languages section
    locator:
      xpath: "//android.widget.TextView[@text='Languages']"
- assertVisible:
    target: Languages page title
    locator:
      xpath: "//android.widget.TextView[@text='Languages']"
    optional: false
- pressKey: Back
- tapOn:
    target: Site Settings section
    locator:
      xpath: "//android.widget.TextView[@text='Site settings']"
- assertVisible:
    target: Site Settings page title
    locator:
      xpath: "//android.widget.TextView[@text='Site settings']"
    optional: false
- pressKey: Back
- tapOn:
    target: Notifications section
    locator:
      xpath: "//android.widget.TextView[@text='Notifications']"
- assertVisible:
    target: Notifications page title
    locator:
      xpath: "//android.widget.TextView[@text='Notifications']"
    optional: false
- pressKey: Back
- swipe:
    direction: up
    duration: 500
- tapOn:
    target: About Microsoft Edge section
    locator:
      xpath: "//android.widget.TextView[@text='About Microsoft Edge']"
- assertVisible:
    target: About Microsoft Edge page title
    locator:
      xpath: "//android.widget.TextView[@text='About Microsoft Edge']"
    optional: false
- killApp
