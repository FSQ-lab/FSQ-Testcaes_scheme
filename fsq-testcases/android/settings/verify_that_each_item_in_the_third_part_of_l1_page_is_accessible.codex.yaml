schemaVersion: fsq.ai-test/v1
name: Verify that each item in the third part of L1 page is accessible
description: Converted from Edge Android Behave BDD scenario.
platform: android
appId: com.microsoft.emmx
tags:
- p0
- codex-converted
---
- launchApp
- tapOn:
    target: Browser menu
    locator:
      resourceId: com.microsoft.emmx:id/overflow_button_bottom
- tapOn:
    target: Settings
    locator:
      xpath: "//android.widget.TextView[@text='Settings']"
- performActions:
  - type: pointer
    id: codex-scroll-up
    parameters:
      pointerType: touch
    actions:
    - type: pointerMove
      origin: viewport
      x: 540
      y: 1500
    - type: pointerDown
      button: 0
    - type: pointerMove
      origin: viewport
      x: 540
      y: 800
      duration: 2000
    - type: pointerUp
      button: 0
- tapOn:
    target: Languages section
    locator:
      xpath: "//android.widget.TextView[@text='Languages']"
- assertVisible:
    target: Languages page title
    locator:
      xpath: "//android.widget.TextView[@text='Languages']"
    optional: false
- tapOn:
    target: Navigate up
    locator:
      accessibilityId: Navigate up
- tapOn:
    target: Site Settings section
    locator:
      xpath: "//android.widget.TextView[@text='Site settings']"
- assertVisible:
    target: Site Settings page title
    locator:
      xpath: "//android.widget.TextView[@text='Site settings']"
    optional: false
- tapOn:
    target: Navigate up
    locator:
      accessibilityId: Navigate up
- tapOn:
    target: Notifications section
    locator:
      xpath: "//android.widget.TextView[@text='Notifications']"
- assertVisible:
    target: Notifications page title
    locator:
      xpath: "//android.widget.TextView[@text='Notifications']"
    optional: false
- tapOn:
    target: Navigate up
    locator:
      accessibilityId: Navigate up
- performActions:
  - type: pointer
    id: codex-scroll-up
    parameters:
      pointerType: touch
    actions:
    - type: pointerMove
      origin: viewport
      x: 540
      y: 1500
    - type: pointerDown
      button: 0
    - type: pointerMove
      origin: viewport
      x: 540
      y: 800
      duration: 2000
    - type: pointerUp
      button: 0
- tapOn:
    target: About Microsoft Edge section
    locator:
      xpath: "//android.widget.TextView[@text='About Microsoft Edge']"
- assertVisible:
    target: About Microsoft Edge page title
    locator:
      xpath: "//android.widget.TextView[@text='About Microsoft Edge']"
    optional: false
- killApp
