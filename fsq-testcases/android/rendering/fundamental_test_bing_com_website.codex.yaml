schemaVersion: fsq.ai-test/v1
name: Fundamental Test bing.com website
description: Converted from Edge Android Behave BDD scenario.
platform: android
appId: com.microsoft.emmx
tags:
- p0
- codex-converted
---
- launchApp
- assertVisible:
    target: New Tab Page account menu
    locator:
      accessibilityId: Account menu
    optional: false
- tapOn:
    target: Search box in NTP page
    locator:
      resourceId: com.microsoft.emmx:id/search_box_text
- inputText:
    text: bing.com
    target: Search box
    locator:
      resourceId: com.microsoft.emmx:id/url_bar
- pressKey: Enter
- performActions:
  - type: none
    id: codex-wait-page-load
    actions:
    - type: pause
      duration: 3000
- assert:
    element:
      resourceId: com.microsoft.emmx:id/url_bar
    text:
      contains: bing.com
    optional: false
- assertWithAI:
    prompt: Analyze the screenshot to verify bing webpage displayed normally with Microsoft Bing logo, search box, and typical Bing homepage layout.
    optional: false
- killApp
