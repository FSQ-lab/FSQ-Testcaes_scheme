schemaVersion: fsq.ai-test/v1
name: Input complete URL in search box
description: Converted from Edge Android Behave BDD scenario.
platform: android
appId: com.microsoft.emmx
tags:
- p0
- codex-converted
---
- launchApp
- assertVisible:
    target: New Tab Page account menu
    locator:
      accessibilityId: Account menu
    optional: false
- tapOn:
    target: Search box on NTP page
    locator:
      resourceId: com.microsoft.emmx:id/search_box_text
- inputText:
    text: https://www.chinatravel.com
    target: Search box
    locator:
      resourceId: com.microsoft.emmx:id/url_bar
- pressKey: Enter
- assert:
    element:
      resourceId: com.microsoft.emmx:id/url_bar
    text:
      contains: chinatravel.com
    optional: false
- tapOn:
    target: Create My Trip
    locator:
      xpath: "//android.view.View[@content-desc='Create My Trip']"
- performActions:
  - type: pointer
    id: codex-scroll-page-up
    parameters:
      pointerType: touch
    actions:
    - type: pointerMove
      origin: viewport
      x: 540
      y: 1500
    - type: pointerDown
      button: 0
    - type: pointerMove
      origin: viewport
      x: 540
      y: 800
      duration: 2000
    - type: pointerUp
      button: 0
- performActions:
  - type: pointer
    id: codex-scroll-page-down
    parameters:
      pointerType: touch
    actions:
    - type: pointerMove
      origin: viewport
      x: 540
      y: 800
    - type: pointerDown
      button: 0
    - type: pointerMove
      origin: viewport
      x: 540
      y: 1500
      duration: 2000
    - type: pointerUp
      button: 0
- tapOn:
    target: Back button on bottom toolbar
    locator:
      accessibilityId: Go back
- assert:
    element:
      resourceId: com.microsoft.emmx:id/url_bar
    text:
      contains: chinatravel.com
    optional: false
- killApp
