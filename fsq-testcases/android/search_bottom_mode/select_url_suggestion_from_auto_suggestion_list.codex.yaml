schemaVersion: fsq.ai-test/v1
name: Select URL suggestion from auto suggestion list
description: Converted from Edge Android Behave BDD scenario.
platform: android
appId: com.microsoft.emmx
tags:
- p0
- codex-converted
---
- launchApp
- tapOn:
    target: Search box
- tapOn:
    target: Go
- inputText:
    text: developer.wikimedia.org
    target: Search box
- tapOn:
    target: I select "Discover and build Wikimedia technology" from the auto suggestion
      list
- assert:
    url:
      contains: developer.wikimedia.org
    optional: false
- tapOn:
    target: First link on page
- swipe:
    direction: up
    duration: 500
- tapOn:
    target: I scroll the page down for 2 seconds
- pressKey: Back
- assert:
    url:
      contains: developer.wikimedia.org
    optional: false
