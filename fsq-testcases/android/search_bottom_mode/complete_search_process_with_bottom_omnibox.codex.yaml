schemaVersion: fsq.ai-test/v1
name: Complete search process with bottom omnibox
description: Converted from Edge Android Behave BDD scenario.
platform: android
appId: com.microsoft.emmx
tags:
- p0
- codex-converted
---
- launchApp
- tapOn:
    target: Address bar on NTP page
    locator:
      resourceId: com.microsoft.emmx:id/url_bar
- assertVisible:
    target: the topsites shown on ZIP
    locator:
      resourceId: com.microsoft.emmx:id/suggestion_top_sites_list
    optional: false
- assertVisible:
    target: the camera search icon on omnibox
    locator:
      resourceId: com.microsoft.emmx:id/attachment_right_camera_button
    optional: false
- assertVisible:
    target: the Copilot voice icon on omnibox
    locator:
      resourceId: com.microsoft.emmx:id/attachment_right_mic_button
    optional: false
- inputText:
    text: chinatravel.com
    target: Search box
    locator:
      resourceId: com.microsoft.emmx:id/url_bar
- assertVisible:
    target: the suggestion list shown next to Omnibox
    locator:
      resourceId: com.microsoft.emmx:id/omnibox_suggestions_dropdown
    optional: false
- pressKey: Enter
- assert:
    element:
      xpath: "//android.widget.EditText[@text='chinatravel.com']"
    optional: false
- killApp
