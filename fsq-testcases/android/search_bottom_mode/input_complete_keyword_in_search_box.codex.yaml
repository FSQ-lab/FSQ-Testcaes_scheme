schemaVersion: fsq.ai-test/v1
name: Input complete keyword in search box
description: Converted from Edge Android Behave BDD scenario.
platform: android
appId: com.microsoft.emmx
tags:
- p0
- codex-converted
---
- launchApp
- tapOn:
    target: Search box on NTP page
    locator:
      resourceId: com.microsoft.emmx:id/url_bar
- inputText:
    text: machine learning tutorials
    target: Search box
    locator:
      resourceId: com.microsoft.emmx:id/url_bar
- pressKey: Enter
- performActions:
  - type: none
    id: codex-wait-search-results
    actions:
    - type: pause
      duration: 3000
- assert:
    element:
      resourceId: com.microsoft.emmx:id/url_bar
    text:
      contains: machine learning tutorials
    optional: false
- assertVisible:
    target: Search results for machine learning tutorials
    locator:
      xpath: "//android.widget.TextView[contains(@text, 'machine') or contains(@text, 'Machine')]"
    optional: false
- performActions:
  - type: pointer
    id: codex-scroll-page-up
    parameters:
      pointerType: touch
    actions:
    - type: pointerMove
      origin: viewport
      x: 540
      y: 1500
    - type: pointerDown
      button: 0
    - type: pointerMove
      origin: viewport
      x: 540
      y: 800
      duration: 2000
    - type: pointerUp
      button: 0
- performActions:
  - type: pointer
    id: codex-scroll-page-down
    parameters:
      pointerType: touch
    actions:
    - type: pointerMove
      origin: viewport
      x: 540
      y: 800
    - type: pointerDown
      button: 0
    - type: pointerMove
      origin: viewport
      x: 540
      y: 1500
      duration: 2000
    - type: pointerUp
      button: 0
- assert:
    element:
      resourceId: com.microsoft.emmx:id/url_bar
    text:
      contains: machine learning tutorials
    optional: false
- killApp
