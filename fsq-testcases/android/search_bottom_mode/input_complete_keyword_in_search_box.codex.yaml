schemaVersion: fsq.ai-test/v1
name: Input complete keyword in search box
description: Converted from Edge Android Behave BDD scenario.
platform: android
appId: com.microsoft.emmx
tags:
- p0
- codex-converted
---
- launchApp
- tapOn:
    target: Search box
- inputText:
    text: machine learning tutorials
    target: Search box
    locator:
      resourceId: com.microsoft.emmx:id/url_bar
- pressKey: Enter
- performActions:
  - type: none
    id: wait
    actions:
    - type: pause
      duration: 3000
- tapOn:
    target: I dismiss the permission dialog from bing
- performActions:
  - type: none
    id: wait
    actions:
    - type: pause
      duration: 3000
- assert:
    element:
      resourceId: com.microsoft.emmx:id/url_bar
    text:
      contains: machine learning tutorials
    optional: false
- assertVisible:
    target: Search results for machine learning tutorials
    locator:
      xpath: "//android.widget.TextView[contains(@text, 'machine') or contains(@text, 'Machine')]"
    optional: false
- swipe:
    direction: up
    duration: 500
- tapOn:
    target: I scroll the page down for 2 seconds
- assert:
    element:
      resourceId: com.microsoft.emmx:id/url_bar
    text:
      contains: machine learning tutorials
    optional: false
- killApp
