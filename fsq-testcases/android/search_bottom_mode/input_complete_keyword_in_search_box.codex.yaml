schemaVersion: fsq.ai-test/v1
name: Input complete keyword in search box
description: Converted from Edge Android Behave BDD scenario.
platform: android
appId: com.microsoft.emmx
tags:
- p0
- codex-converted
---
- launchApp
- tapOn:
    target: Search box
- tapOn:
    target: Go
- performActions:
  - type: none
    id: wait
    actions:
    - type: pause
      duration: 3000
- tapOn:
    target: I dismiss the permission dialog from bing
- performActions:
  - type: none
    id: wait
    actions:
    - type: pause
      duration: 3000
- assert:
    url:
      contains: machine learning tutorials
    optional: false
- assertVisible:
    target: Search results for machine learning tutorials
    optional: false
- swipe:
    direction: up
    duration: 500
- tapOn:
    target: I scroll the page down for 2 seconds
- assert:
    url:
      contains: machine learning tutorials
    optional: false
