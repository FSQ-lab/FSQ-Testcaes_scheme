schemaVersion: fsq.ai-test/v1
name: Enter search process and verify address bar
description: Converted from Edge Android Behave BDD scenario.
platform: android
appId: com.microsoft.emmx
tags:
- p0
- codex-converted
---
- launchApp
- assertVisible:
    target: New Tab Page account menu
    locator:
      accessibilityId: Account menu
    optional: false
- tapOn:
    target: Search box on NTP page
    locator:
      resourceId: com.microsoft.emmx:id/url_bar
- assertVisible:
    target: Camera icon on omnibox
    locator:
      resourceId: com.microsoft.emmx:id/attachment_right_camera_button
    optional: false
- assertVisible:
    target: Copilot voice icon on omnibox
    locator:
      resourceId: com.microsoft.emmx:id/attachment_right_mic_button
    optional: false
- inputText:
    text: microsoft
    target: Search box
    locator:
      resourceId: com.microsoft.emmx:id/url_bar
- pressKey: Enter
- assertVisible:
    target: Copilot icon on omnibox
    locator:
      resourceId: com.microsoft.emmx:id/edge_location_bar_copilot_button
    optional: false
- assertVisible:
    target: Refresh icon on omnibox
    locator:
      resourceId: com.microsoft.emmx:id/refresh_button
    optional: false
- tapOn:
    target: Search box
    locator:
      resourceId: com.microsoft.emmx:id/url_bar
- assert:
    element:
      resourceId: com.microsoft.emmx:id/url_bar
    text:
      contains: microsoft
    optional: false
- killApp
