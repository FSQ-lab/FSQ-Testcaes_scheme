schemaVersion: fsq.ai-test/v1
name: Access history through overflow menu
description: Converted from Edge Android Behave BDD scenario.
platform: android
appId: com.microsoft.emmx
tags:
- p0
- codex-converted
---
- launchApp
- assertVisible:
    target: New Tab Page account menu
    locator:
      accessibilityId: Account menu
    optional: false
- tapOn:
    target: Browser menu
    locator:
      resourceId: com.microsoft.emmx:id/overflow_button_bottom
- tapOn:
    target: History
    locator:
      xpath: "//android.widget.TextView[@text='History']"
- assertVisible:
    target: History panel should open
    locator:
      resourceId: com.microsoft.emmx:id/hub_view_pager
    optional: false
- assert:
    element:
      resourceId: com.microsoft.emmx:id/hint_text
    text:
      contains: History
    optional: false
- tapOn:
    target: Close History panel
    locator:
      resourceId: com.microsoft.emmx:id/close_button
- assertVisible:
    target: New Tab Page
    locator:
      resourceId: com.microsoft.emmx:id/edge_ntp_scrollview
    optional: false
- tapOn:
    target: Browser menu
    locator:
      resourceId: com.microsoft.emmx:id/overflow_button_bottom
- tapOn:
    target: History
    locator:
      xpath: "//android.widget.TextView[@text='History']"
- assert:
    element:
      resourceId: com.microsoft.emmx:id/hint_text
    text:
      contains: History
    optional: false
- pressKey: Back
- assertVisible:
    target: New Tab Page
    locator:
      resourceId: com.microsoft.emmx:id/edge_ntp_scrollview
    optional: false
- killApp
