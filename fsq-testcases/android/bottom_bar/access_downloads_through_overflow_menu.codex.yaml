schemaVersion: fsq.ai-test/v1
name: Access downloads through overflow menu
description: Converted from Edge Android Behave BDD scenario.
platform: android
appId: com.microsoft.emmx
tags:
- p0
- codex-converted
---
- launchApp
- tapOn:
    target: Browser menu
    locator:
      resourceId: com.microsoft.emmx:id/overflow_button_bottom
- tapOn:
    target: Downloads
    locator:
      xpath: "//android.widget.TextView[@text='Downloads']"
- assertVisible:
    target: Downloads panel should open
    locator:
      resourceId: com.microsoft.emmx:id/hub_view_pager
    optional: false
- assert:
    element:
      xpath: "//android.widget.TextView[@text='Downloads']"
    text:
      contains: Downloads
    optional: false
- tapOn:
    target: Close Downloads panel
    locator:
      resourceId: com.microsoft.emmx:id/close_button
- assertVisible:
    target: New Tab Page
    locator:
      resourceId: com.microsoft.emmx:id/edge_ntp_scrollview
    optional: false
- tapOn:
    target: Browser menu
    locator:
      resourceId: com.microsoft.emmx:id/overflow_button_bottom
- tapOn:
    target: Downloads
    locator:
      xpath: "//android.widget.TextView[@text='Downloads']"
- assert:
    element:
      xpath: "//android.widget.TextView[@text='Downloads']"
    text:
      contains: Downloads
    optional: false
- pressKey: Back
- assertVisible:
    target: New Tab Page
    locator:
      resourceId: com.microsoft.emmx:id/edge_ntp_scrollview
    optional: false
- killApp
