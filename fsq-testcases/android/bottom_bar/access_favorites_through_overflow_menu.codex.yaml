schemaVersion: fsq.ai-test/v1
name: Access favorites through overflow menu
description: Converted from Edge Android Behave BDD scenario.
platform: android
appId: com.microsoft.emmx
tags:
- p0
- codex-converted
---
- launchApp
- tapOn:
    target: Browser menu
    locator:
      resourceId: com.microsoft.emmx:id/overflow_button_bottom
- tapOn:
    target: Favorites
    locator:
      xpath: "//android.widget.TextView[@text='Favorites']"
- assertVisible:
    target: Favorites panel should open
    locator:
      resourceId: com.microsoft.emmx:id/bookmark_view_switcher
    optional: false
- assertVisible:
    target: Favorites panel title
    locator:
      xpath: "//android.widget.TextView[@text='Favorites']"
    optional: false
- tapOn:
    target: Close Favorites panel
    locator:
      resourceId: com.microsoft.emmx:id/close_button
- assertVisible:
    target: New Tab Page
    locator:
      resourceId: com.microsoft.emmx:id/edge_ntp_scrollview
    optional: false
- tapOn:
    target: Browser menu
    locator:
      resourceId: com.microsoft.emmx:id/overflow_button_bottom
- tapOn:
    target: Favorites
    locator:
      xpath: "//android.widget.TextView[@text='Favorites']"
- assertVisible:
    target: Favorites panel title
    locator:
      xpath: "//android.widget.TextView[@text='Favorites']"
    optional: false
- pressKey: Back
- assertVisible:
    target: New Tab Page
    locator:
      resourceId: com.microsoft.emmx:id/edge_ntp_scrollview
    optional: false
- killApp
