schemaVersion: fsq.ai-test/v1
name: Access settings through overflow menu
description: Converted from Edge Android Behave BDD scenario.
platform: android
appId: com.microsoft.emmx
tags:
- p0
- codex-converted
---
- launchApp
- assertVisible:
    target: New Tab Page account menu
    locator:
      accessibilityId: Account menu
    optional: false
- tapOn:
    target: Browser menu
    locator:
      resourceId: com.microsoft.emmx:id/overflow_button_bottom
- tapOn:
    target: Settings
    locator:
      xpath: "//android.widget.TextView[@text='Settings']"
- assertVisible:
    target: Settings panel should open
    locator:
      xpath: "//android.widget.TextView[@text='Settings']"
    optional: false
- assert:
    element:
      xpath: "//android.widget.TextView[@text='Settings']"
    text:
      contains: Settings
    optional: false
- tapOn:
    target: Close Settings panel
    locator:
      resourceId: com.microsoft.emmx:id/close_button
- assertVisible:
    target: New Tab Page
    locator:
      resourceId: com.microsoft.emmx:id/edge_ntp_scrollview
    optional: false
- tapOn:
    target: Browser menu
    locator:
      resourceId: com.microsoft.emmx:id/overflow_button_bottom
- tapOn:
    target: Settings
    locator:
      xpath: "//android.widget.TextView[@text='Settings']"
- assert:
    element:
      xpath: "//android.widget.TextView[@text='Settings']"
    text:
      contains: Settings
    optional: false
- pressKey: Back
- assertVisible:
    target: New Tab Page
    locator:
      resourceId: com.microsoft.emmx:id/edge_ntp_scrollview
    optional: false
- killApp
