schemaVersion: fsq.ai-test/v1
name: Refresh webpage can work well in top mode
description: Converted from Edge Android Behave BDD scenario.
platform: android
appId: com.microsoft.emmx
tags:
- p0
- codex-converted
---
- launchApp
- tapOn:
    target: Search box on NTP page
    locator:
      resourceId: com.microsoft.emmx:id/url_bar
- inputText:
    text: https://www.chinatravel.com
    target: Search box
    locator:
      resourceId: com.microsoft.emmx:id/url_bar
- pressKey: Enter
- longPressOn:
    target: Address bar
    locator:
      resourceId: com.microsoft.emmx:id/url_bar
- tapOn:
    target: Move address bar to top
- assertVisible:
    target: Refresh button on omnibox
    locator:
      resourceId: com.microsoft.emmx:id/refresh_button
    optional: false
- tapOn:
    target: Refresh button
    locator:
      resourceId: com.microsoft.emmx:id/refresh_button
- assertVisible:
    target: Web page after reload
    locator:
      className: android.webkit.WebView
    optional: false
- performActions:
  - type: pointer
    id: codex-scroll-page-down
    parameters:
      pointerType: touch
    actions:
    - type: pointerMove
      origin: viewport
      x: 540
      y: 800
    - type: pointerDown
      button: 0
    - type: pointerMove
      origin: viewport
      x: 540
      y: 1500
      duration: 2000
    - type: pointerUp
      button: 0
- assertVisible:
    target: Web page after scroll
    locator:
      className: android.webkit.WebView
    optional: false
- killApp
