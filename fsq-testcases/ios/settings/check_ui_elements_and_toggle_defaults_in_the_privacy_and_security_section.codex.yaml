schemaVersion: fsq.ai-test/v1
name: Check UI elements and toggle defaults in the "Privacy and Security" section
description: Converted from Edge iOS Behave BDD scenario.
platform: ios
appId: com.microsoft.msedge
tags:
- settings
- p0
- codex-converted
---
- launchApp
- tapOn:
    target: navigate to the Settings page
    locator:
      name: kLegacyToolbarToolsMenuButtonIdentifier
    timeout: 10000
- tapOn:
    target: navigate to the "Privacy and Security" section
    locator:
      name: Privacy and Security
    timeout: 10000
- assertVisible:
    target: the element "Diagnostic Data"
    locator:
      name: Diagnostic Data
    timeout: 10000
    optional: false
- assert:
    element:
      name: kEdgeSettingsPrivacyTrackingPreventionCellId
    text:
      contains: 'On'
    optional: false
- tapOn:
    target: '"Done" button on the top right corner'
    locator:
      name: kSettingsDoneButtonId
    timeout: 10000
- assertVisible:
    target: am landing on new tab page
    locator:
      name: NTPCollectionViewIdentifier
    timeout: 10000
    optional: false
- killApp
