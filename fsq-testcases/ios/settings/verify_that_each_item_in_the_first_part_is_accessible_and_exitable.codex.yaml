schemaVersion: fsq.ai-test/v1
name: Verify that each item in the first part is accessible and exitable
description: Converted from Edge iOS Behave BDD scenario.
platform: ios
appId: com.microsoft.msedge
runner:
  backend: appium-mcp
tags:
- settings
- p0
- codex-converted
---
- launchApp
- tapOn:
    target: navigate to the Settings page
    locator:
      name: kLegacyToolbarToolsMenuButtonIdentifier
    timeout: 10000
- assertWithAI:
    prompt: 'Analyze the screenshot to verify that settings page contains the following
      items1: '
    optional: false
    timeout: 30000
- tapOn:
    target: navigate to the "Payment Methods" section
    locator:
      name: Payment Methods
    timeout: 10000
- assertVisible:
    target: the page title "Payment Methods"
    locator:
      accessibilityId: Payment Methods
    timeout: 10000
    optional: false
- tapOn:
    target: back button on the upper left corner
    locator:
      name: Settings
    timeout: 10000
- tapOn:
    target: navigate to the "Personal Info" section
    locator:
      name: Personal Info
    timeout: 10000
- assertVisible:
    target: the page title "Personal Info"
    locator:
      accessibilityId: Personal Info
    timeout: 10000
    optional: false
- tapOn:
    target: back button on the upper left corner
    locator:
      name: Settings
    timeout: 10000
- tapOn:
    target: navigate to the "Privacy and Security" section
    locator:
      name: Privacy and Security
    timeout: 10000
- assertVisible:
    target: the page title "Privacy and Security"
    locator:
      accessibilityId: Privacy and Security
    timeout: 10000
    optional: false
- tapOn:
    target: back button on the upper left corner
    locator:
      name: Settings
    timeout: 10000
- tapOn:
    target: navigate to the "Microsoft Services" section
    locator:
      name: Microsoft Services
    timeout: 10000
- assertVisible:
    target: the page title "Microsoft Services"
    locator:
      accessibilityId: Microsoft Services
    timeout: 10000
    optional: false
- tapOn:
    target: '"Done" button on the top right corner'
    locator:
      name: kSettingsDoneButtonId
    timeout: 10000
- assertVisible:
    target: am landing on new tab page
    locator:
      name: NTPCollectionViewIdentifier
    timeout: 10000
    optional: false
- killApp
