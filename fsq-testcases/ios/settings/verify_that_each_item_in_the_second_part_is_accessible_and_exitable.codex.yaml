schemaVersion: fsq.ai-test/v1
name: Verify that each item in the second part is accessible and exitable
description: Converted from Edge iOS Behave BDD scenario.
platform: ios
appId: com.microsoft.msedge
runner:
  backend: appium-mcp
tags:
- settings
- p0
- codex-converted
---
- launchApp
- tapOn:
    target: navigate to the Settings page
    locator:
      name: kLegacyToolbarToolsMenuButtonIdentifier
    timeout: 10000
- tapOn:
    target: navigate to the "Search" section
    locator:
      name: kEdgeSettingsSearchCellId
    timeout: 10000
- assertVisible:
    target: the page title "Search"
    locator:
      accessibilityId: Search
    timeout: 10000
    optional: false
- tapOn:
    target: back button on the upper left corner
    locator:
      name: Settings
    timeout: 10000
- tapOn:
    target: '"Appearance and layout" button'
    locator:
      name: kEdgeSettingsAppearanceCellId
    timeout: 10000
- assertVisible:
    target: the page title "Appearance and Layout"
    locator:
      name: Appearance and Layout
    timeout: 10000
    optional: false
- tapOn:
    target: back button on the upper left corner
    locator:
      name: Settings
    timeout: 10000
- tapOn:
    target: navigate to the "New Tab Page" section
    locator:
      name: kEdgeSettingsNTPCellId
    timeout: 10000
- assertVisible:
    target: the page title "New Tab Page"
    locator:
      xpath: //XCUIElementTypeStaticText[@value="New Tab Page"]
    timeout: 10000
    optional: false
- tapOn:
    target: back button on the upper left corner
    locator:
      name: Settings
    timeout: 10000
- performActions:
  - type: pointer
    id: finger1
    parameters:
      pointerType: touch
    actions:
    - type: pointerMove
      duration: 0
      origin: viewport
      x: 196
      y: 700
    - type: pointerDown
      button: 0
    - type: pointerMove
      duration: 1000
      origin: viewport
      x: 196
      y: 300
    - type: pointerUp
      button: 0
- assertWithAI:
    prompt: 'Analyze the screenshot to verify that settings page contains the following
      items2: '
    optional: false
    timeout: 30000
- tapOn:
    target: navigate to the "Tabs and Tab Groups" section
    locator:
      name: Tabs and Tab Groups
    timeout: 10000
- assertVisible:
    target: the page title "Tabs and Tab Groups"
    locator:
      accessibilityId: Tabs and Tab Groups
    timeout: 10000
    optional: false
- tapOn:
    target: '"Done" button on the top right corner'
    locator:
      name: kSettingsDoneButtonId
    timeout: 10000
- assertVisible:
    target: am landing on new tab page
    locator:
      name: NTPCollectionViewIdentifier
    timeout: 10000
    optional: false
- killApp
