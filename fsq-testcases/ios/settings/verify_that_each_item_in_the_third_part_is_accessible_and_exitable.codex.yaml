- assertWithAI:
    prompt: analyze the screenshot to verify that settings page contains the following items3
    optional: false
- tapOn:
    target: Languages section
- assertVisible:
    target: Languages page title
    optional: false
- pressKey: Back
- tapOn:
    target: Site Settings section
- assertVisible:
    target: Site Settings page title
    optional: false
- pressKey: Back
- tapOn:
    target: Notifications section
- assertVisible:
    target: Notifications page title
    optional: false
- pressKey: Back
- tapOn:
    target: About Microsoft Edge section
- assertVisible:
    target: About Microsoft Edge page title
    optional: false
- tapOn:
    target: Done
- assertVisible:
    target: New tab page
    optional: false
- killApp
