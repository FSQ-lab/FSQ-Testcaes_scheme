schemaVersion: fsq.ai-test/v1
name: Complete dark mode workflow through overflow menu on NTP
description: Converted from Edge iOS Behave BDD scenario.
platform: ios
appId: com.microsoft.msedge
runner:
  backend: appium-mcp
tags:
- overflow_menu
- p0
- codex-converted
---
- launchApp
- tapOn:
    target: overflow menu button
    locator:
      accessibilityId: kLegacyToolbarToolsMenuButtonIdentifier
    timeout: 10000
- performActions:
  - type: pointer
    id: finger1
    parameters:
      pointerType: touch
    actions:
    - type: pointerMove
      duration: 0
      origin: viewport
      x: 350
      y: 640
    - type: pointerDown
      button: 0
    - type: pointerMove
      duration: 1000
      origin: viewport
      x: 50
      y: 640
    - type: pointerUp
      button: 0
- tapOn:
    target: Dark mode option
    locator:
      xpath: //XCUIElementTypeCell[@name='Dark mode']
    timeout: 10000
- assertVisible:
    target: Dark mode bottom sheet
    locator:
      xpath: //XCUIElementTypeStaticText[@name='kDeweyBottomSheetTitleId' and @value='Dark mode, Bottom sheet']
    timeout: 10000
    optional: false
- assertVisible:
    target: Light option
    locator:
      xpath: //XCUIElementTypeStaticText[@name='Light']
    timeout: 10000
    optional: false
- assertVisible:
    target: Dark option
    locator:
      xpath: //XCUIElementTypeStaticText[@name='Dark']
    timeout: 10000
    optional: false
- assertVisible:
    target: System default option
    locator:
      xpath: //XCUIElementTypeStaticText[@name='System default']
    timeout: 10000
    optional: false
- performActions:
  - type: pointer
    id: finger1
    parameters:
      pointerType: touch
    actions:
    - type: pointerMove
      duration: 0
      origin: viewport
      x: 196
      y: 400
    - type: pointerDown
      button: 0
    - type: pointerUp
      button: 0
- assertVisible:
    target: NTP collection view
    locator:
      name: NTPCollectionViewIdentifier
    timeout: 10000
    optional: false
- killApp
