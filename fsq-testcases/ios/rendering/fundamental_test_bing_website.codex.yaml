schemaVersion: fsq.ai-test/v1
name: Fundamental Test bing website
description: Converted from Edge iOS Behave BDD scenario.
platform: ios
appId: com.microsoft.msedge
tags:
- p0
- codex-converted
---
- launchApp
- tapOn:
    target: the search box in NTP page
    locator:
      accessibilityId: Search and address bar
    timeout: 10000
- inputText:
    text: www.bing.com
    target: type "www.bing.com" in the search box
    locator:
      name: Address
- tapOn:
    target: press go button to search
    locator:
      accessibilityId: Go
    timeout: 10000
- assertVisible:
    target: the Microsoft bing logo
    locator:
      name: Microsoft Logo Image
    timeout: 10000
    optional: false
- killApp
