schemaVersion: fsq.ai-test/v1
name: Use auto complete to input search content in top mode
description: Converted from Edge iOS Behave BDD scenario.
platform: ios
appId: com.microsoft.msedge
tags:
- p0
- codex-converted
---
- launchApp
- tapOn:
    target: the top address bar on NTP page
    locator:
      name: NTPHomeFakeOmniboxAccessibilityID
    timeout: 10000
- inputText:
    text: apple
    target: input a keyword "apple" in the search box
    locator:
      name: Address
- tapOn:
    target: '"Go" on keyboard'
    locator:
      name: Go
    timeout: 10000
- tapOn:
    target: dismiss the permission dialog from bing
    locator:
      name: Allow While Using App
    timeout: 10000
- tapOn:
    target: + button on the bottom toolbar
    locator:
      accessibilityId: kToolbarEdgeNewTabButtonIdentifier
    timeout: 10000
- tapOn:
    target: the top address bar on NTP page
    locator:
      name: NTPHomeFakeOmniboxAccessibilityID
    timeout: 10000
- inputText:
    text: appl
    target: type "appl" in the search box
    locator:
      name: Address
- assert:
    element:
      accessibilityId: Address
    text:
      contains: apple
    optional: false
- tapOn:
    target: '"Go" on keyboard'
    locator:
      name: Go
    timeout: 10000
- assertWithAI:
    prompt: verify the web page the page is Apple official website and the search
      address bar is on the top of the page
    optional: false
    timeout: 30000
- assertVisible:
    target: analyze the screenshot to the search result is apple related
    locator:
      xpath: //*[contains(@label, 'Apple') or contains(@value, 'apple')]
    timeout: 10000
    optional: false
- killApp
