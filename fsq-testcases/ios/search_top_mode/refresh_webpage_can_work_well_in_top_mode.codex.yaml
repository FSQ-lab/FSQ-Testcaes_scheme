schemaVersion: fsq.ai-test/v1
name: Refresh webpage can work well in top mode
description: Converted from Edge iOS Behave BDD scenario.
platform: ios
appId: com.microsoft.msedge
runner:
  backend: appium-mcp
tags:
- p0
- codex-converted
---
- launchApp
- tapOn:
    target: the search box on NTP page
    locator:
      name: Search and address bar
    timeout: 10000
- inputText:
    text: 'microsoft '
    target: input a keyword "microsoft" in the search box
    locator:
      name: Address
- tapOn:
    target: dismiss the permission dialog from bing
    locator:
      name: Allow While Using App
    timeout: 10000
- tapOn:
    target: '"Go" on keyboard'
    locator:
      name: Go
    timeout: 10000
- tapOn:
    target: perform a long press gesture on address bar
- tapOn:
    target: '"Move address bar to top" option'
    locator:
      name: Move address bar to top
    timeout: 10000
- assertVisible:
    target: see the refresh button shown on omnibox
    locator:
      name: kEdgeOmniboxReloadButtonIdentifier
    timeout: 10000
    optional: false
- tapOn:
    target: the refresh button
    locator:
      name: kEdgeOmniboxReloadButtonIdentifier
    timeout: 10000
- assertWithAI:
    prompt: 'verify the web page does not have large blank spaces, and '
    optional: false
    timeout: 30000
- performActions:
  - type: pointer
    id: finger1
    parameters:
      pointerType: touch
    actions:
    - type: pointerMove
      duration: 0
      origin: viewport
      x: 196
      y: 500
    - type: pointerDown
      button: 0
    - type: pointerMove
      duration: 2000
      origin: viewport
      x: 196
      y: 300
    - type: pointerUp
      button: 0
- assertWithAI:
    prompt: 'verify the web page does not have large blank spaces, and '
    optional: false
    timeout: 30000
- killApp
