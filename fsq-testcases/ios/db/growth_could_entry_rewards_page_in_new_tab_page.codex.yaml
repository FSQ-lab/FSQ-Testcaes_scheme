schemaVersion: fsq.ai-test/v1
name: Growth Could entry rewards page in New Tab page
description: Converted from Edge iOS Behave BDD scenario.
platform: ios
appId: com.microsoft.msedge
tags:
- p0
- codex-converted
---
- launchApp
- tapOn:
    target: sign in to Edge with MSA
- tapOn:
    target: the account in NTP page
    locator:
      name: kEdgeNTPViewAvatarViewIdentifier
    timeout: 10000
- tapOn:
    target: the "Microsoft Rewards" option
    locator:
      name: Microsoft Rewards
    timeout: 10000
- assertVisible:
    target: can see the Microsoft Rewards page open normally
    locator:
      name: Microsoft Rewards
    timeout: 10000
    optional: false
- killApp
