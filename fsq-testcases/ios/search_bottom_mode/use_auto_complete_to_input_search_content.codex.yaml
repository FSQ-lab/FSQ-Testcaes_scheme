schemaVersion: fsq.ai-test/v1
name: Use auto complete to input search content
description: Converted from Edge iOS Behave BDD scenario.
platform: ios
appId: com.microsoft.msedge
tags:
- p0
- codex-converted
---
- launchApp
- tapOn:
    target: the search box on NTP page
    locator:
      name: Search and address bar
    timeout: 10000
- inputText:
    text: apple
    target: input a keyword "apple" in the search box
    locator:
      name: Address
- tapOn:
    target: '"Go" on keyboard'
    locator:
      name: Go
    timeout: 10000
- tapOn:
    target: dismiss the permission dialog from bing
    locator:
      name: Allow While Using App
    timeout: 10000
- tapOn:
    target: + button on the bottom toolbar
    locator:
      accessibilityId: kToolbarEdgeNewTabButtonIdentifier
    timeout: 10000
- tapOn:
    target: the search box on NTP page
    locator:
      name: Search and address bar
    timeout: 10000
- tapOn:
    target: type "a" in the search box
    locator:
      name: a
    timeout: 10000
- assert:
    element:
      accessibilityId: Address
    text:
      contains: apple
    optional: false
- tapOn:
    target: '"Go" on keyboard'
    locator:
      name: Go
    timeout: 10000
- assertVisible:
    target: search results for "apple"
    locator:
      xpath: //*[contains(@label, 'Apple')]
    timeout: 10000
    optional: false
- killApp
