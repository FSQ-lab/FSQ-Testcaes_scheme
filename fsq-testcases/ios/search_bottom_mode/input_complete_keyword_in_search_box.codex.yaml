schemaVersion: fsq.ai-test/v1
name: Input complete keyword in search box
description: Converted from Edge iOS Behave BDD scenario.
platform: ios
appId: com.microsoft.msedge
runner:
  backend: appium-mcp
tags:
- p0
- codex-converted
---
- launchApp
- tapOn:
    target: + button on the bottom toolbar
    locator:
      accessibilityId: kToolbarEdgeNewTabButtonIdentifier
    timeout: 10000
- tapOn:
    target: the search box on NTP page
    locator:
      name: Search and address bar
    timeout: 10000
- inputText:
    text: machine learning tutorials
    target: input a keyword "machine learning tutorials" in the search box
    locator:
      name: Address
- tapOn:
    target: '"Go" on keyboard'
    locator:
      name: Go
    timeout: 10000
- tapOn:
    target: dismiss the permission dialog from bing
    locator:
      name: Allow While Using App
    timeout: 10000
- assertWithAI:
    prompt: 'Verify that the search results page contains machine '
    optional: false
    timeout: 30000
- performActions:
  - type: pointer
    id: finger1
    parameters:
      pointerType: touch
    actions:
    - type: pointerMove
      duration: 0
      origin: viewport
      x: 196
      y: 400
    - type: pointerDown
      button: 0
    - type: pointerMove
      duration: 2000
      origin: viewport
      x: 196
      y: 500
    - type: pointerUp
      button: 0
- performActions:
  - type: pointer
    id: finger1
    parameters:
      pointerType: touch
    actions:
    - type: pointerMove
      duration: 0
      origin: viewport
      x: 196
      y: 500
    - type: pointerDown
      button: 0
    - type: pointerMove
      duration: 2000
      origin: viewport
      x: 196
      y: 300
    - type: pointerUp
      button: 0
- assert:
    element:
      name: Search and address bar
    text:
      contains: machine learning tutorials
    optional: false
- killApp
