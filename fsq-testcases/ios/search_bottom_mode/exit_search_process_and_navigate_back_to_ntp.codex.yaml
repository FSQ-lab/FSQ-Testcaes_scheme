schemaVersion: fsq.ai-test/v1
name: Exit search process and Navigate back to NTP
description: Converted from Edge iOS Behave BDD scenario.
platform: ios
appId: com.microsoft.msedge
tags:
- p0
- codex-converted
---
- launchApp
- tapOn:
    target: the search box on NTP page
    locator:
      name: Search and address bar
    timeout: 10000
- tapOn:
    target: the back arrow button
    locator:
      name: OmniboxCancelButtonAccessibilityIdentifier
    timeout: 10000
- assertVisible:
    target: can see the new tab page
    locator:
      name: NTPCollectionViewIdentifier
    timeout: 10000
    optional: false
- tapOn:
    target: the address bar on NTP page
    locator:
      name: Search and address bar
    timeout: 10000
- inputText:
    text: https://www.chinatravel.com
    target: input "https://www.chinatravel.com" in search box
    locator:
      name: Address
- tapOn:
    target: '"Go" on keyboard'
    locator:
      name: Go
    timeout: 10000
- tapOn:
    target: open browser menu
    locator:
      name: kLegacyToolbarToolsMenuButtonIdentifier
    timeout: 10000
- tapOn:
    target: the "Home" button
    locator:
      xpath: //XCUIElementTypeCell[@name='Home' and @visible='true']
    timeout: 10000
- assertVisible:
    target: can see the new tab page
    locator:
      name: NTPCollectionViewIdentifier
    timeout: 10000
    optional: false
- killApp
