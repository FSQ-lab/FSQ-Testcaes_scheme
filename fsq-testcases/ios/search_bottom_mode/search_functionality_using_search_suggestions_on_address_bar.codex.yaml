schemaVersion: fsq.ai-test/v1
name: Search functionality using search suggestions on address bar
description: Converted from Edge iOS Behave BDD scenario.
platform: ios
appId: com.microsoft.msedge
runner:
  backend: appium-mcp
tags:
- p0
- codex-converted
---
- launchApp
- tapOn:
    target: the search box on NTP page
    locator:
      name: Search and address bar
    timeout: 10000
- inputText:
    text: apple
    target: input a keyword "apple" in the search box
    locator:
      name: Address
- tapOn:
    target: select the first search suggestion from the Search suggestion list
    locator:
      name: omnibox suggestion 0 7
    timeout: 10000
- tapOn:
    target: dismiss the permission dialog from bing
    locator:
      name: Allow While Using App
    timeout: 10000
- assertVisible:
    target: search results for "apple"
    locator:
      xpath: //*[contains(@label, 'Apple')]
    timeout: 10000
    optional: false
- killApp
