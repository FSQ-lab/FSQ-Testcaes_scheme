schemaVersion: fsq.ai-test/v1
name: search history keyword can be accessiable on zip page
description: Converted from Edge iOS Behave BDD scenario.
platform: ios
appId: com.microsoft.msedge
tags:
- p0
- codex-converted
---
- launchApp
- tapOn:
    target: dismiss the permission dialog from bing
    locator:
      name: Allow While Using App
    timeout: 10000
- tapOn:
    target: the search box on NTP page
    locator:
      name: Search and address bar
    timeout: 10000
- inputText:
    text: 'microsoft '
    target: input a keyword "microsoft" in the search box
    locator:
      name: Address
- tapOn:
    target: '"Go" on keyboard'
    locator:
      name: Go
    timeout: 10000
- tapOn:
    target: + button on the bottom toolbar
    locator:
      accessibilityId: kToolbarEdgeNewTabButtonIdentifier
    timeout: 10000
- tapOn:
    target: the search box on NTP page
    locator:
      name: Search and address bar
    timeout: 10000
- assert:
    element:
      xpath: //XCUIElementTypeStaticText[@value='microsoft']
    text:
      contains: microsoft
    optional: false
- killApp
