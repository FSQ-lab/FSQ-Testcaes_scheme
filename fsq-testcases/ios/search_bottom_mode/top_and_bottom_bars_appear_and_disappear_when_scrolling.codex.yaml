schemaVersion: fsq.ai-test/v1
name: Top and bottom bars appear and disappear when scrolling
description: Converted from Edge iOS Behave BDD scenario.
platform: ios
appId: com.microsoft.msedge
runner:
  backend: appium-mcp
tags:
- p0
- codex-converted
---
- launchApp
- tapOn:
    target: the search box on NTP page
    locator:
      name: Search and address bar
    timeout: 10000
- inputText:
    text: https://www.chinatravel.com
    target: input "https://www.chinatravel.com" in search box
    locator:
      name: Address
- tapOn:
    target: '"Go" on keyboard'
    locator:
      name: Go
    timeout: 10000
- performActions:
  - type: pointer
    id: finger1
    parameters:
      pointerType: touch
    actions:
    - type: pointerMove
      duration: 0
      origin: viewport
      x: 196
      y: 600
    - type: pointerDown
      button: 0
    - type: pointerMove
      duration: 2000
      origin: viewport
      x: 196
      y: 200
    - type: pointerUp
      button: 0
- assertVisible:
    target: address bar is minimized and show "chinatravel.com"
    locator:
      name: Collapsed primary toolbar button
    timeout: 10000
    optional: false
- performActions:
  - type: pointer
    id: finger1
    parameters:
      pointerType: touch
    actions:
    - type: pointerMove
      duration: 0
      origin: viewport
      x: 196
      y: 200
    - type: pointerDown
      button: 0
    - type: pointerMove
      duration: 2000
      origin: viewport
      x: 196
      y: 600
    - type: pointerUp
      button: 0
- assertVisible:
    target: address bar is fully expanded and show "chinatravel.com"
    locator:
      name: chinatravel.com
    timeout: 10000
    optional: false
- tapOn:
    target: + button on the bottom toolbar
    locator:
      accessibilityId: kToolbarEdgeNewTabButtonIdentifier
    timeout: 10000
- assertVisible:
    target: am landing on new tab page
    locator:
      name: NTPCollectionViewIdentifier
    timeout: 10000
    optional: false
- killApp
