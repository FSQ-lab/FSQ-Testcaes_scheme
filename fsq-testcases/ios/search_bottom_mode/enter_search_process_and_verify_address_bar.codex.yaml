schemaVersion: fsq.ai-test/v1
name: Enter search process and verify address bar
description: Converted from Edge iOS Behave BDD scenario.
platform: ios
appId: com.microsoft.msedge
tags:
- p0
- codex-converted
---
- launchApp
- tapOn:
    target: + button on the bottom toolbar
    locator:
      accessibilityId: kToolbarEdgeNewTabButtonIdentifier
    timeout: 10000
- tapOn:
    target: the search box on NTP page
    locator:
      name: Search and address bar
    timeout: 10000
- assertVisible:
    target: Omnibox with Camera icon and Copilot voice icon
    locator:
      name: Camera search
    timeout: 10000
    optional: false
- inputText:
    text: 'microsoft '
    target: input a keyword "microsoft" in the search box
    locator:
      name: Address
- tapOn:
    target: '"Go" on keyboard'
    locator:
      name: Go
    timeout: 10000
- assertVisible:
    target: the omnibox with Copilot icon and refresh icon
    locator:
      name: Copilot
    timeout: 10000
    optional: false
- tapOn:
    target: the search box
    locator:
      name: Search and address bar
    timeout: 10000
- assert:
    element:
      name: Address
    text:
      contains: microsoft
    optional: false
- killApp
