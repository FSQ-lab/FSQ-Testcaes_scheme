schemaVersion: fsq.ai-test/v1
name: Verify Bottom address bar on NTP
description: Converted from Edge iOS Behave BDD scenario.
platform: ios
appId: com.microsoft.msedge
runner:
  backend: appium-mcp
tags:
- p0
- codex-converted
---
- launchApp
- tapOn:
    target: + button on the bottom toolbar
    locator:
      accessibilityId: kToolbarEdgeNewTabButtonIdentifier
    timeout: 10000
- tapOn:
    target: change the NTP page layout to Partial view
    locator:
      name: New tab page layout settings
    timeout: 10000
- tapOn:
    target: close the Page settings dialog
- performActions:
  - type: pointer
    id: finger1
    parameters:
      pointerType: touch
    actions:
    - type: pointerMove
      duration: 0
      origin: viewport
      x: 196
      y: 1000
    - type: pointerDown
      button: 0
    - type: pointerMove
      duration: 3000
      origin: viewport
      x: 196
      y: 300
    - type: pointerUp
      button: 0
- assertVisible:
    target: the omnibox with Copilot icon and Copilot voice icon
    locator:
      name: Copilot
    timeout: 10000
    optional: false
