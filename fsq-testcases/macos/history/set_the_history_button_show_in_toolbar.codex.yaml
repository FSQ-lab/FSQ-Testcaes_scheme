schemaVersion: fsq.ai-test/v1
name: Set the History button show in toolbar
description: Converted from Edge Mac Behave BDD scenario.
platform: macos
appId: com.microsoft.edgemac
tags:
- p0
- regression
- history
- codex-converted
---
- launchApp
- tapOn:
    target: '"Settings and more" button in toolbar'
    locator:
      accessibilityId: Settings and more
    timeout: 10000
- tapOn:
    target: right "History" button in menu
- tapOn:
    target: '"Show in toolbar" in menu'
    locator:
      accessibilityId: Show in Toolbar
    timeout: 10000
- assertVisible:
    target: '"History" should be displayed in toolbar'
    locator:
      accessibilityId: History
    timeout: 10000
    optional: false
- killApp
