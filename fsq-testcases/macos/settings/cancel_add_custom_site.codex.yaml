schemaVersion: fsq.ai-test/v1
name: Cancel add custom site
description: Converted from Edge Mac Behave BDD scenario.
platform: macos
appId: com.microsoft.edgemac
runner:
  backend: appium-mcp
tags:
- regression
- p0
- settings
- codex-converted
---
- launchApp
- tapOn:
    target: Address bar
    locator:
      accessibilityId: Address and search bar
    timeout: 10000
- inputText:
    text: edge://settings/startHomeNTP
    target: Address bar
    locator:
      accessibilityId: Address and search bar
- pressKey: Enter
- inputText:
    text: edge://settings/startHomeNTP
    target: input "edge://settings/startHomeNTP" to the address bar
    locator:
      accessibilityId: Address and search bar
- pressKey: Enter
- tapOn:
    target: select the option "Open custom sites"
    locator:
      name: Open custom sites
    timeout: 10000
- tapOn:
    target: the "Add site" button
    locator:
      accessibilityId: Add site
    timeout: 10000
- assertVisible:
    target: '"Add site" dialog should be opened'
    locator:
      accessibilityId: Website
    timeout: 10000
    optional: false
- tapOn:
    target: Address bar
    locator:
      accessibilityId: Address and search bar
    timeout: 10000
- inputText:
    text: https://www.bing.com
    target: Address bar
    locator:
      accessibilityId: Address and search bar
- pressKey: Enter
- tapOn:
    target: Address bar
    locator:
      accessibilityId: Address and search bar
    timeout: 10000
- inputText:
    text: https://www.bing.com
    target: Address bar
    locator:
      accessibilityId: Address and search bar
- pressKey: Enter
- inputText:
    text: https://www.bing.com
    target: input "https://www.bing.com" in the URL field on the "Add site" dialog
    locator:
      xpath: (//XCUIElementTypeGroup[@label="Website"])
- tapOn:
    target: the "Cancel" button on the "Add site" dialog
    locator:
      name: Cancel
    timeout: 10000
- assertNotVisible:
    target: '"Add site" dialog should be closed'
    locator:
      xpath: //XCUIElementTypeTextField[@title="Website"]
    timeout: 10000
    optional: false
- killApp
