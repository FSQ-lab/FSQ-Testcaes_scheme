schemaVersion: fsq.ai-test/v1
name: Open settings page
description: Converted from Edge Mac Behave BDD scenario.
platform: macos
appId: com.microsoft.edgemac
runner:
  backend: appium-mcp
tags:
- regression
- p0
- settings
- codex-converted
---
- launchApp
- tapOn:
    target: '"Settings and more" button on toolbar'
    locator:
      accessibilityId: Settings and more
    timeout: 10000
- tapOn:
    target: select "Settings" button from the dropdown menu
    locator:
      accessibilityId: Settings ⌘Comma ⌘Comma
    timeout: 10000
- assertVisible:
    target: settings page should be opened
    locator:
      accessibilityId: Settings
    timeout: 10000
    optional: false
- tapOn:
    target: open a new tab by clicking the "New Tab" button
    locator:
      accessibilityId: New Tab
    timeout: 10000
- inputText:
    text: edge://settings
    target: input "edge://settings" to the address bar
    locator:
      accessibilityId: Address and search bar
- tapOn:
    target: Address bar
    locator:
      accessibilityId: Address and search bar
    timeout: 10000
- inputText:
    text: edge://settings
    target: Address bar
    locator:
      accessibilityId: Address and search bar
- pressKey: Enter
- assertVisible:
    target: settings page should be opened
    locator:
      accessibilityId: Settings
    timeout: 10000
    optional: false
- killApp
