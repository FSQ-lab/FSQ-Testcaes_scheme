schemaVersion: fsq.ai-test/v1
name: Open settings page
description: Converted from Edge Mac Behave BDD scenario.
platform: macos
appId: com.microsoft.edgemac
tags:
- regression
- p0
- settings
- codex-converted
---
- launchApp
- tapOn:
    target: Settings and more button
- tapOn:
    target: Settings button from dropdown menu
- assert:
    url:
      contains: edge://settings
    optional: false
- tapOn:
    target: New Tab button
    locator:
      accessibilityId: New Tab
- tapOn:
    target: Address bar
    locator:
      accessibilityId: Address and search bar
    timeout: 10000
- inputText:
    text: edge://settings
    target: Address bar
    locator:
      accessibilityId: Address and search bar
- assert:
    url:
      contains: edge://settings
    optional: false
- killApp
