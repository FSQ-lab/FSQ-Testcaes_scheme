schemaVersion: fsq.ai-test/v1
name: Set NTP as home page
description: Converted from Edge Mac Behave BDD scenario.
platform: macos
appId: com.microsoft.edgemac
runner:
  backend: appium-mcp
tags:
- settings
- smoke
- p0
- codex-converted
---
- launchApp
- tapOn:
    target: Address bar
    locator:
      accessibilityId: Address and search bar
    timeout: 10000
- inputText:
    text: edge://settings/startHomeNTP
    target: Address bar
    locator:
      accessibilityId: Address and search bar
- pressKey: Enter
- inputText:
    text: edge://settings/startHomeNTP
    target: input "edge://settings/startHomeNTP" to the address bar
    locator:
      accessibilityId: Address and search bar
- pressKey: Enter
- tapOn:
    target: turn on the option "show home button on the toolbar"
    locator:
      accessibilityId: Show home button on the toolbar
    timeout: 10000
- tapOn:
    target: select the option "New tab page"
    locator:
      accessibilityId: New tab page
    timeout: 10000
- tapOn:
    target: '"Home" button to the left of the address bar'
    locator:
      accessibilityId: Home
    timeout: 10000
- assert:
    element:
      xpath: //XCUIElementTypeWindow
    text:
      contains: New Tab
    optional: false
- killApp
