---
- launchApp
- tapOn:
    target: Address bar
    locator:
      accessibilityId: Address and search bar
    timeout: 10000
- inputText:
    text: edge://settings/startHomeNTP
    target: Address bar
    locator:
      accessibilityId: Address and search bar
- tapOn:
    target: show home button on the toolbar option
- tapOn:
    target: New tab page option
- tapOn:
    target: Home button
- assertVisible:
    target: should open a page titled "New Tab"
    optional: false
- killApp
