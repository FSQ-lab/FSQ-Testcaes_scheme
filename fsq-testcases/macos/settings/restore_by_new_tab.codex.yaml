schemaVersion: fsq.ai-test/v1
name: Restore by new tab
description: Converted from Edge Mac Behave BDD scenario.
platform: macos
appId: com.microsoft.edgemac
runner:
  backend: appium-mcp
tags:
- regression
- p0
- settings
- codex-converted
---
- launchApp
- tapOn:
    target: Address bar
    locator:
      accessibilityId: Address and search bar
    timeout: 10000
- inputText:
    text: edge://settings/startHomeNTP
    target: Address bar
    locator:
      accessibilityId: Address and search bar
- pressKey: Enter
- inputText:
    text: edge://settings/startHomeNTP
    target: input "edge://settings/startHomeNTP" to the address bar
    locator:
      accessibilityId: Address and search bar
- pressKey: Enter
- tapOn:
    target: select the option "Open the new tab page"
    locator:
      accessibilityId: Open the new tab page
    timeout: 10000
- tapOn:
    target: open a new tab
    locator:
      accessibilityId: New Tab
    timeout: 10000
- tapOn:
    target: Address bar
    locator:
      accessibilityId: Address and search bar
    timeout: 10000
- inputText:
    text: https://www.bing.com
    target: Address bar
    locator:
      accessibilityId: Address and search bar
- pressKey: Enter
- tapOn:
    target: close and restart Edge
- assertVisible:
    target: edge should open with a page titled "New Tab"
    locator:
      name: New Tab
    timeout: 10000
    optional: false
- killApp
