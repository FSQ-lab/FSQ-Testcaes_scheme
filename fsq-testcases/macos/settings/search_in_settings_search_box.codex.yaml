schemaVersion: fsq.ai-test/v1
name: Search in settings search box
description: Converted from Edge Mac Behave BDD scenario.
platform: macos
appId: com.microsoft.edgemac
tags:
- regression
- p0
- settings
- codex-converted
---
- launchApp
- tapOn:
    target: '"Settings and more" button on toolbar'
    locator:
      accessibilityId: Settings and more
    timeout: 10000
- tapOn:
    target: select "Settings" button from the dropdown menu
    locator:
      accessibilityId: Settings ⌘Comma ⌘Comma
    timeout: 10000
- assertVisible:
    target: settings page should be opened
    locator:
      accessibilityId: Settings
    timeout: 10000
    optional: false
- inputText:
    text: Privacy
    target: input "Privacy" in the settings search box
    locator:
      xpath: //XCUIElementTypeTextField[@placeholderValue='Search settings']
- assertVisible:
    target: search results should display relevant settings related to "Privacy"
    locator:
      accessibilityId: Privacy, search, and services
    timeout: 10000
    optional: false
- tapOn:
    target: clear the search box
    locator:
      accessibilityId: Clear search
    timeout: 10000
- assertVisible:
    target: search results should reset to show all settings
    locator:
      accessibilityId: Top settings
    timeout: 10000
    optional: false
- inputText:
    text: '123'
    target: input "123" in the settings search box
    locator:
      xpath: //XCUIElementTypeTextField[@placeholderValue='Search settings']
- tapOn:
    target: search results should display "No search results found"
- killApp
