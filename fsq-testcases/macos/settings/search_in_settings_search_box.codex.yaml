schemaVersion: fsq.ai-test/v1
name: Search in settings search box
description: Converted from Edge Mac Behave BDD scenario.
platform: macos
appId: com.microsoft.edgemac
tags:
- regression
- p0
- settings
- codex-converted
---
- launchApp
- tapOn:
    target: Settings and more button
- tapOn:
    target: Settings button from dropdown menu
- assert:
    url:
      contains: edge://settings
    optional: false
- inputText:
    text: Privacy
    target: Settings search box
- assertVisible:
    target: Search result Privacy
    locator:
      text: Privacy
    optional: false
- clearText:
    target: Settings search box
- assertVisible:
    target: All settings search results
    optional: false
- inputText:
    text: '123'
    target: Settings search box
- assertVisible:
    target: Search result No search results found
    locator:
      text: No search results found
    optional: false
