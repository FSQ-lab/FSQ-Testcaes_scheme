schemaVersion: fsq.ai-test/v1
name: Show/hide sidebar
description: Converted from Edge Mac Behave BDD scenario.
platform: macos
appId: com.microsoft.edgemac
runner:
  backend: appium-mcp
tags:
- regression
- p0
- settings
- codex-converted
---
- launchApp
- tapOn:
    target: Address bar
    locator:
      accessibilityId: Address and search bar
    timeout: 10000
- inputText:
    text: edge://settings/appearance/copilotAndSidebar
    target: Address bar
    locator:
      accessibilityId: Address and search bar
- pressKey: Enter
- inputText:
    text: edge://settings/appearance/copilotAndSidebar
    target: input "edge://settings/appearance/copilotAndSidebar" to the address bar
    locator:
      accessibilityId: Address and search bar
- pressKey: Enter
- tapOn:
    target: select "Always on" option in Settings page
    locator:
      name: Always on
    timeout: 10000
- assertVisible:
    target: sidebar should be visible
    locator:
      name: Side bar
    timeout: 10000
    optional: false
- tapOn:
    target: select "Off" option in Settings page
    locator:
      name: 'Off'
    timeout: 10000
- assertNotVisible:
    target: sidebar should be hidden
    locator:
      name: Side bar
    timeout: 10000
    optional: false
- killApp
