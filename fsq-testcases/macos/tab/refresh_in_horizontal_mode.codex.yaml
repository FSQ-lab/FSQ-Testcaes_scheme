schemaVersion: fsq.ai-test/v1
name: Refresh in horizontal mode
description: Converted from Edge Mac Behave BDD scenario.
platform: macos
appId: com.microsoft.edgemac
tags:
- p0
- codex-converted
---
- launchApp
- tapOn:
    target: Address bar
    locator:
      accessibilityId: Address and search bar
    timeout: 10000
- inputText:
    text: https://www.youtube.com
    target: Address bar
    locator:
      accessibilityId: Address and search bar
- pressKey: Enter
- tapOn:
    target: Address bar
    locator:
      accessibilityId: Address and search bar
    timeout: 10000
- inputText:
    text: https://www.youtube.com
    target: Address bar
    locator:
      accessibilityId: Address and search bar
- pressKey: Enter
- tapOn:
    target: right the tab header of "Youtube" tab
- tapOn:
    target: '"Refresh" from the context menu'
    locator:
      xpath: //XCUIElementTypeMenuItem[@title='Refresh']
    timeout: 10000
- assertVisible:
    target: page should be refreshed
    locator:
      xpath: //XCUIElementTypeStaticText[@value='Try searching to get started']
    timeout: 10000
    optional: false
- assertVisible:
    target: address bar still displays the complete URL "https://www.youtube.com"
    locator:
      xpath: //XCUIElementTypeTextField[@label='Address and search bar' and @value='https://www.youtube.com']
    timeout: 10000
    optional: false
- killApp
