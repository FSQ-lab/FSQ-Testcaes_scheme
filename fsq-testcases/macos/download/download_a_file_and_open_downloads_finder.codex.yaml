schemaVersion: fsq.ai-test/v1
name: Download a file and open downloads finder
description: Converted from Edge Mac Behave BDD scenario.
platform: macos
appId: com.microsoft.edgemac
tags:
- p0
- regression
- download
- codex-converted
---
- launchApp
- tapOn:
    target: clean Edge downloads file "sample-1.pdf"
- tapOn:
    target: Address bar
    locator:
      accessibilityId: Address and search bar
    timeout: 10000
- inputText:
    text: https://getsamplefiles.com/download/pdf/sample-1.pdf
    target: Address bar
    locator:
      accessibilityId: Address and search bar
- pressKey: Enter
- assertVisible:
    target: Downloads panel should appear
    locator:
      accessibilityId: Downloads
    timeout: 10000
    optional: false
- tapOn:
    target: '"Search downloads" in Downloads panel'
    locator:
      accessibilityId: Search downloads
    timeout: 10000
- tapOn:
    target: hover over the file name containing "sample-1" in the Downloads panel
- tapOn:
    target: the "Show in Finder" button
    locator:
      accessibilityId: Show in Finder
    timeout: 10000
- assertWithAI:
    prompt: Verify that a Finder window is open on the screen, showing the Downloads
      folder interface
    optional: false
    timeout: 30000
- killApp
