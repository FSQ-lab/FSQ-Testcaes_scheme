schemaVersion: fsq.ai-test/v1
name: Delete and edit all URL to navigate to new site
description: Converted from Edge Mac Behave BDD scenario.
platform: macos
appId: com.microsoft.edgemac
tags:
- p0
- ominibox
- codex-converted
---
- launchApp
- tapOn:
    target: Address bar
    locator:
      accessibilityId: Address and search bar
    timeout: 10000
- inputText:
    text: https://www.apple.com
    target: Address bar
    locator:
      accessibilityId: Address and search bar
- pressKey: Enter
- assert:
    url:
      equals: https://www.apple.com
    optional: false
- tapOn:
    target: I select all text in address bar
- pressKey: Backspace
- tapOn:
    target: Address bar
    locator:
      accessibilityId: Address and search bar
    timeout: 10000
- inputText:
    text: www.expedia.com
    target: Address bar
    locator:
      accessibilityId: Address and search bar
- pressKey: Enter
- tapOn:
    target: Address bar
    locator:
      accessibilityId: Address and search bar
    timeout: 10000
- inputText:
    text: Expedia
    target: Address bar
    locator:
      accessibilityId: Address and search bar
- pressKey: Enter
- assert:
    url:
      equals: https://www.expedia.com
    optional: false
