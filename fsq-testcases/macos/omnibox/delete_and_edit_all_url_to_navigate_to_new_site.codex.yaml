schemaVersion: fsq.ai-test/v1
name: Delete and edit all URL to navigate to new site
description: Converted from Edge Mac Behave BDD scenario.
platform: macos
appId: com.microsoft.edgemac
tags:
- p0
- ominibox
- codex-converted
---
- launchApp
- tapOn:
    target: Address bar
    locator:
      accessibilityId: Address and search bar
    timeout: 10000
- inputText:
    text: https://www.apple.com
    target: Address bar
    locator:
      accessibilityId: Address and search bar
- pressKey: Enter
- assertVisible:
    target: address bar should display the complete URL "https://www.apple.com"
    locator:
      xpath: //XCUIElementTypeTextField[@label='Address and search bar' and @value='https://www.apple.com']
    timeout: 10000
    optional: false
- tapOn:
    target: select all text in address bar
    locator:
      accessibilityId: Address and search bar
    timeout: 10000
- pressKey: command+a
- pressKey: Delete
- inputText:
    text: www.expedia.com
    target: input "www.expedia.com" in address bar
    locator:
      accessibilityId: Address and search bar
- pressKey: Enter
- assertVisible:
    target: should navigate to "Expedia" page successfully
    locator:
      accessibilityId: Expedia logo
    timeout: 10000
    optional: false
- assert:
    element:
      accessibilityId: Address and search bar
    text:
      contains: https://www.expedia.com
    optional: false
- killApp
