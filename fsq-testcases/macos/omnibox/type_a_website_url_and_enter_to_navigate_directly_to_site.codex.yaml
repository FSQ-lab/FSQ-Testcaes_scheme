schemaVersion: fsq.ai-test/v1
name: Type a website URL and enter to navigate directly to site
description: Converted from Edge Mac Behave BDD scenario.
platform: macos
appId: com.microsoft.edgemac
tags:
- p0
- ominibox
- codex-converted
---
- launchApp
- tapOn:
    target: Address bar
    locator:
      accessibilityId: Address and search bar
    timeout: 10000
- inputText:
    text: www.163.com
    target: Address bar
    locator:
      accessibilityId: Address and search bar
- pressKey: Enter
- inputText:
    text: www.163.com
    target: input "www.163.com" in address bar
    locator:
      accessibilityId: Address and search bar
- pressKey: Enter
- assertVisible:
    target: '"163" website should be opened'
    locator:
      name: 网易
    timeout: 10000
    optional: false
- assertVisible:
    target: address bar should display the complete URL "https://www.163.com"
    locator:
      accessibilityId: Address and search bar
    timeout: 10000
    optional: false
- killApp
