schemaVersion: fsq.ai-test/v1
name: Navigate to website by selecting from dropdown suggestions
description: Converted from Edge Mac Behave BDD scenario.
platform: macos
appId: com.microsoft.edgemac
runner:
  backend: appium-mcp
tags:
- p0
- ominibox
- codex-converted
---
- launchApp
- tapOn:
    target: open a new tab
    locator:
      accessibilityId: New Tab
    timeout: 10000
- tapOn:
    target: type "www.apple.com" in the address bar
    locator:
      accessibilityId: Address and search bar
    timeout: 10000
- inputText:
    text: www.apple.com
    target: type "www.apple.com" in the address bar
    locator:
      accessibilityId: Address and search bar
- assertVisible:
    target: dropdown list should appear with URL suggestions
    locator:
      accessibilityId: Suggestions
    timeout: 10000
    optional: false
- tapOn:
    target: the top item "www.apple.com" in the dropdown list
    locator:
      xpath: '//XCUIElementTypeStaticText[@value="www.apple.com" and '
    timeout: 10000
- assertVisible:
    target: should navigate to "https://www.apple.com" successfully
    locator:
      accessibilityId: Address and search bar
    timeout: 10000
    optional: false
- assertVisible:
    target: address bar should display the complete URL "https://www.apple.com"
    locator:
      xpath: //XCUIElementTypeTextField[@label='Address and search bar' and @value='https://www.apple.com']
    timeout: 10000
    optional: false
- killApp
