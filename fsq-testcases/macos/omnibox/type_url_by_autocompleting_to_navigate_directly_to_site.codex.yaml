schemaVersion: fsq.ai-test/v1
name: Type URL by autocompleting to navigate directly to site
description: Converted from Edge Mac Behave BDD scenario.
platform: macos
appId: com.microsoft.edgemac
tags:
- p0
- ominibox
- codex-converted
---
- launchApp
- tapOn:
    target: Address bar
    locator:
      accessibilityId: Address and search bar
    timeout: 10000
- inputText:
    text: https://www.apple.com
    target: Address bar
    locator:
      accessibilityId: Address and search bar
- pressKey: Enter
- tapOn:
    target: open a new tab
    locator:
      accessibilityId: New Tab
    timeout: 10000
- tapOn:
    target: type "www.app" in the address bar
    locator:
      accessibilityId: Address and search bar
    timeout: 10000
- inputText:
    text: www.app
    target: type "www.app" in the address bar
    locator:
      accessibilityId: Address and search bar
- pressKey: Enter
- assertVisible:
    target: should navigate to "https://www.apple.com" successfully
    locator:
      accessibilityId: Address and search bar
    timeout: 10000
    optional: false
- assertVisible:
    target: address bar should display the complete URL "https://www.apple.com"
    locator:
      xpath: //XCUIElementTypeTextField[@label='Address and search bar' and @value='https://www.apple.com']
    timeout: 10000
    optional: false
- killApp
