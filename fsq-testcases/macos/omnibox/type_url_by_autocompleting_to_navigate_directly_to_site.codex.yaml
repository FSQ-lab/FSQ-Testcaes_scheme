schemaVersion: fsq.ai-test/v1
name: Type URL by autocompleting to navigate directly to site
description: Converted from Edge Mac Behave BDD scenario.
platform: macos
appId: com.microsoft.edgemac
tags:
- p0
- ominibox
- codex-converted
---
- launchApp
- tapOn:
    target: Address bar
    locator:
      accessibilityId: Address and search bar
    timeout: 10000
- inputText:
    text: https://www.apple.com
    target: Address bar
    locator:
      accessibilityId: Address and search bar
- pressKey: Enter
- tapOn:
    target: New Tab button
    locator:
      accessibilityId: New Tab
- tapOn:
    target: Address bar
    locator:
      accessibilityId: Address and search bar
    timeout: 10000
- inputText:
    text: www.app
    target: Address bar
    locator:
      accessibilityId: Address and search bar
- pressKey: Enter
- tapOn:
    target: Address bar
    locator:
      accessibilityId: Address and search bar
    timeout: 10000
- inputText:
    text: https://www.apple.com
    target: Address bar
    locator:
      accessibilityId: Address and search bar
- pressKey: Enter
- assert:
    url:
      equals: https://www.apple.com
    optional: false
