schemaVersion: fsq.ai-test/v1
name: Navigate using partial URL without protocol
description: Converted from Edge Mac Behave BDD scenario.
platform: macos
appId: com.microsoft.edgemac
tags:
- p0
- ominibox
- codex-converted
---
- launchApp
- tapOn:
    target: Address bar
    locator:
      accessibilityId: Address and search bar
    timeout: 10000
- inputText:
    text: apple.com
    target: Address bar
    locator:
      accessibilityId: Address and search bar
- pressKey: Enter
- inputText:
    text: apple.com
    target: input "apple.com" in address bar
    locator:
      accessibilityId: Address and search bar
- pressKey: Enter
- assertVisible:
    target: should navigate to "https://www.apple.com" successfully
    locator:
      accessibilityId: Address and search bar
    timeout: 10000
    optional: false
- assertVisible:
    target: address bar should display the complete URL "https://www.apple.com"
    locator:
      xpath: //XCUIElementTypeTextField[@label='Address and search bar' and @value='https://www.apple.com']
    timeout: 10000
    optional: false
- killApp
