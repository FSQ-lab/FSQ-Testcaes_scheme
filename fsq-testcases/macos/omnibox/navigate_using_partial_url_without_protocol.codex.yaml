schemaVersion: fsq.ai-test/v1
name: Navigate using partial URL without protocol
description: Converted from Edge Mac Behave BDD scenario.
platform: macos
appId: com.microsoft.edgemac
tags:
- p0
- ominibox
- codex-converted
---
- launchApp
- tapOn:
    target: Address bar
    locator:
      accessibilityId: Address and search bar
    timeout: 10000
- inputText:
    text: apple.com
    target: Address bar
    locator:
      accessibilityId: Address and search bar
- pressKey: Enter
- tapOn:
    target: Address bar
    locator:
      accessibilityId: Address and search bar
    timeout: 10000
- inputText:
    text: https://www.apple.com
    target: Address bar
    locator:
      accessibilityId: Address and search bar
- pressKey: Enter
- assert:
    url:
      equals: https://www.apple.com
    optional: false
- killApp
