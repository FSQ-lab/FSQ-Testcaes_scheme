schemaVersion: fsq.ai-test/v1
name: Edit all URL to navigate to new site
description: Converted from Edge Mac Behave BDD scenario.
platform: macos
appId: com.microsoft.edgemac
tags:
- p0
- ominibox
- codex-converted
---
- launchApp
- tapOn:
    target: type "https://www.google.com" in the address bar
    locator:
      xpath: //XCUIElementTypeTextField[@label='Address and search bar']
    timeout: 10000
- inputText:
    text: https://www.google.com
    target: type "https://www.google.com" in the address bar
    locator:
      xpath: //XCUIElementTypeTextField[@label='Address and search bar']
- assertVisible:
    target: address bar should display the complete URL "https://www.google.com"
    locator:
      xpath: //XCUIElementTypeTextField[@label='Address and search bar' and @value='https://www.google.com']
    timeout: 10000
    optional: false
- tapOn:
    target: select all text in the address bar
    locator:
      xpath: //XCUIElementTypeTextField[@label='Address and search bar']
    timeout: 10000
- pressKey: command+a
- inputText:
    text: https://www.apple.com
    target: type "https://www.apple.com" in the address bar
    locator:
      xpath: //XCUIElementTypeTextField[@label='Address and search bar']
- pressKey: Enter
- assertVisible:
    target: should navigate to "https://www.apple.com" successfully
    locator:
      accessibilityId: Address and search bar
    timeout: 10000
    optional: false
- assertVisible:
    target: address bar should display the complete URL "https://www.apple.com"
    locator:
      xpath: //XCUIElementTypeTextField[@label='Address and search bar' and @value='https://www.apple.com']
    timeout: 10000
    optional: false
- killApp
