schemaVersion: fsq.ai-test/v1
name: Search keywords by default Bing engine in address bar
description: Converted from Edge Mac Behave BDD scenario.
platform: macos
appId: com.microsoft.edgemac
runner:
  backend: appium-mcp
tags:
- p0
- codex-converted
---
- launchApp
- tapOn:
    target: open a new tab
    locator:
      accessibilityId: New Tab
    timeout: 10000
- tapOn:
    target: input "cat" in address bar
    locator:
      accessibilityId: Address and search bar
    timeout: 10000
- inputText:
    text: cat
    target: input "cat" in address bar
    locator:
      accessibilityId: Address and search bar
- pressKey: Enter
- assert:
    element:
      name: cat - Search
    text:
      contains: cat - Search
    optional: false
- killApp
