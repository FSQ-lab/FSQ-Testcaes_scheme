schemaVersion: fsq.ai-test/v1
name: Delete and edit all URL to navigate to new site
description: Converted from Edge Windows Behave BDD scenario.
platform: windows
app:
  name: edge
  exe: C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe
  windowTitleRegex: .*Microsoft Edge.*
runner:
  backend: pywinauto-mcp
tags:
- navigation
- regression
- p0
- codex-converted
---
- launchApp
- executeMethod:
    script: native_navigate
    args:
      url: https://www.apple.com
      timeout: 5000
- assert:
    element:
      name: https://www.apple.com
      controlType: Edit
    text:
      contains: https://www.apple.com
    optional: false
- tapOn:
    target: select all text in address bar
- pressKey:
    key: A
    modifiers: [Control]
- pressKey: Backspace
- tapOn:
    target: Address bar
    locator:
      name: Address and search bar
      controlType: Edit
    timeout: 10000
- inputText:
    text: www.bbc.com
    target: Address bar
    locator:
      name: Address and search bar
      controlType: Edit
- pressKey: Enter
- assertVisible:
    target: should navigate to "BBC" page successfully
    locator:
      name: BBC Home
      controlType: TabItem
    timeout: 10000
    optional: false
- assert:
    element:
      name: https://www.bbc.com
      controlType: Edit
    text:
      contains: https://www.bbc.com
    optional: false
- assertVisible:
    target: '"BBC" page should load completely'
    locator:
      automationId: RootWebArea
      controlType: Document
    timeout: 10000
    optional: false
- killApp
