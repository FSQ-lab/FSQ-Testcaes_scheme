schemaVersion: fsq.ai-test/v1
name: Search keywords by selecting search item in dropdown list of address bar
description: Converted from Edge Windows Behave BDD scenario.
platform: windows
app:
  name: edge
  exe: C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe
  windowTitleRegex: .*Microsoft Edge.*
runner:
  backend: pywinauto-mcp
tags:
- search
- regression
- p0
- codex-converted
---
- launchApp
- tapOn:
    target: Address bar
    locator:
      className: OmniboxViewViews
      controlType: Edit
    timeout: 10000
- inputText:
    text: cat
    target: Address bar
    locator:
      className: OmniboxViewViews
      controlType: Edit
- tapOn:
    target: top search suggestion for cat
    locator:
      name: cat, Bing search
      controlType: ListItem
    timeout: 10000
- assertVisible:
    target: search results page related to cat
    locator:
      automationId: RootWebArea
      name: cat - Search
      controlType: Document
    timeout: 10000
    optional: false
- killApp
