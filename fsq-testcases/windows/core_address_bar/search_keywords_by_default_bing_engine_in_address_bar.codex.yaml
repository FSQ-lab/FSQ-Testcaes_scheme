schemaVersion: fsq.ai-test/v1
name: Search keywords by default Bing engine in address bar
description: Converted from Edge Windows Behave BDD scenario.
platform: windows
app:
  name: edge
  exe: C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe
  windowTitleRegex: .*Microsoft Edge.*
runner:
  backend: pywinauto-mcp
tags:
- search
- smoke
- p0
- codex-converted
---
- launchApp
- tapOn:
    target: input "cat" in address bar
- pressKey: Enter
- assertVisible:
    target: tab should jump to the search results page related to "cat"
    locator:
      automationId: RootWebArea
      controlType: Document
    timeout: 10000
    optional: false
- killApp
