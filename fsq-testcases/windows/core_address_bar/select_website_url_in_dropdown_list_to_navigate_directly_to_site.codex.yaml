schemaVersion: fsq.ai-test/v1
name: Select website URL in dropdown list to navigate directly to site
description: Converted from Edge Windows Behave BDD scenario.
platform: windows
app:
  name: edge
  exe: C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe
  windowTitleRegex: .*Microsoft Edge.*
runner:
  backend: pywinauto-mcp
tags:
- navigation
- smoke
- p0
- codex-converted
---
- launchApp
- tapOn:
    target: New Tab button
    locator:
      name: New Tab
      controlType: Button
- tapOn:
    target: Address bar
    locator:
      name: Address and search bar
      controlType: Edit
    timeout: 10000
- inputText:
    text: www.apple.com
    target: Address bar
    locator:
      name: Address and search bar
      controlType: Edit
- assertVisible:
    target: URL suggestion list for www.apple.com
- tapOn:
    target: top suggestion www.apple.com in the address bar dropdown
- waitUntil:
    url:
      contains: apple.com
    timeout: 30000
    optional: false
- assertWithAI:
    prompt: Verify the Apple page is loaded completely in the active tab.
    optional: false
    timeout: 30000
