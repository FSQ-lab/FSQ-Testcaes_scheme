schemaVersion: fsq.ai-test/v1
name: Select website URL in dropdown list to navigate directly to site
description: Converted from Edge Windows Behave BDD scenario.
platform: windows
app:
  name: edge
  exe: C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe
  windowTitleRegex: .*Microsoft Edge.*
runner:
  backend: pywinauto-mcp
tags:
- navigation
- smoke
- p0
- codex-converted
---
- launchApp
- tapOn:
    target: Address bar
    locator:
      name: Address and search bar
      controlType: Edit
    timeout: 10000
- inputText:
    text: www.apple.com
    target: Address bar
    locator:
      name: Address and search bar
      controlType: Edit
- pressKey: Enter
- assertVisible:
    target: dropdown list should appear with URL suggestions
    locator:
      name: Suggestions
      controlType: List
    timeout: 10000
    optional: false
- tapOn:
    target: the top item "www.apple.com" in the dropdown list
    locator:
      name: www.apple.com
      controlType: ListItem
    timeout: 10000
- assertVisible:
    target: should navigate to "Apple" page successfully
    locator:
      name: Apple
      controlType: TabItem
    timeout: 10000
    optional: false
- assert:
    element:
      name: https://www.apple.com
      controlType: Edit
    text:
      contains: https://www.apple.com
    optional: false
- assertVisible:
    target: '"Apple" page should load completely'
    locator:
      automationId: RootWebArea
      controlType: Document
    timeout: 10000
    optional: false
- killApp
