schemaVersion: fsq.ai-test/v1
name: Type URL by autocompleting to navigate directly to site
description: Converted from Edge Windows Behave BDD scenario.
platform: windows
app:
  name: edge
  exe: C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe
  windowTitleRegex: .*Microsoft Edge.*
runner:
  backend: pywinauto-mcp
tags:
- navigation
- regression
- p0
- codex-converted
---
- launchApp
- executeMethod:
    script: native_navigate
    args:
      url: https://www.apple.com
      timeout: 5000
- tapOn:
    target: open a new tab
    locator:
      name: New Tab
      controlType: Button
    timeout: 10000
- tapOn:
    target: Address bar
    locator:
      name: Address and search bar
      controlType: Edit
    timeout: 10000
- inputText:
    text: www.app
    target: Address bar
    locator:
      name: Address and search bar
      controlType: Edit
- pressKey: Enter
- assertVisible:
    target: should navigate to "Apple" page successfully
    locator:
      name: Apple
      controlType: TabItem
    timeout: 10000
    optional: false
- assert:
    element:
      name: https://www.apple.com
      controlType: Edit
    text:
      contains: https://www.apple.com
    optional: false
- assertVisible:
    target: '"Apple" page should load completely'
    locator:
      automationId: RootWebArea
      controlType: Document
    timeout: 10000
    optional: false
- killApp
