schemaVersion: fsq.ai-test/v1
name: Navigate to HTTPS website and verify secure connection
description: Converted from Edge Windows Behave BDD scenario.
platform: windows
app:
  name: edge
  exe: C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe
  windowTitleRegex: .*Microsoft Edge.*
runner:
  backend: pywinauto-mcp
tags:
- navigation
- regression
- p0
- codex-converted
---
- launchApp
- tapOn:
    target: Address bar
    locator:
      name: Address and search bar
      controlType: Edit
    timeout: 10000
- inputText:
    text: https://www.apple.com
    target: Address bar
    locator:
      name: Address and search bar
      controlType: Edit
- pressKey: Enter
- assertVisible:
    target: should navigate to "Apple" page successfully
    locator:
      name: Apple
      controlType: TabItem
    timeout: 10000
    optional: false
- assert:
    element:
      name: https://www.apple.com
      controlType: Edit
    text:
      contains: https://www.apple.com
    optional: false
- assertVisible:
    target: '"Apple" page should load completely'
    locator:
      automationId: RootWebArea
      controlType: Document
    timeout: 10000
    optional: false
- assertVisible:
    target: security indicator should show a secure connection
    locator:
      name: View site information
      controlType: Button
    timeout: 10000
    optional: false
- killApp
