schemaVersion: fsq.ai-test/v1
name: Navigate to HTTP website and verify not secure connection
description: Converted from Edge Windows Behave BDD scenario.
platform: windows
app:
  name: edge
  exe: C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe
  windowTitleRegex: .*Microsoft Edge.*
runner:
  backend: pywinauto-mcp
tags:
- navigation
- regression
- p0
- codex-converted
---
- launchApp
- tapOn:
    target: Address bar
    locator:
      name: Address and search bar
      controlType: Edit
    timeout: 10000
- inputText:
    text: http://www.faqs.org/faqs/
    target: Address bar
    locator:
      name: Address and search bar
      controlType: Edit
- pressKey: Enter
- assertVisible:
    target: should navigate to "FAQs" page successfully
    locator:
      name: Internet FAQ Archives
      controlType: TabItem
    timeout: 10000
    optional: false
- assertVisible:
    target: '"FAQs" page should load completely'
    locator:
      automationId: RootWebArea
      controlType: Document
    timeout: 10000
    optional: false
- assertVisible:
    target: security indicator should show a not secure connection
    locator:
      name: Not secure
      controlType: Button
    timeout: 10000
    optional: false
- killApp
