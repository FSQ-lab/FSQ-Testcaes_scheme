schemaVersion: fsq.ai-test/v1
name: Download a file and open file by clicking Open file button
description: Converted from Edge Windows Behave BDD scenario.
platform: windows
app:
  name: edge
  exe: C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe
  windowTitleRegex: .*Microsoft Edge.*
runner:
  backend: pywinauto-mcp
tags:
- downloads
- regression
- p0
- codex-converted
---
- launchApp
- tapOn:
    target: Address bar
    locator:
      name: Address and search bar
      controlType: Edit
    timeout: 10000
- inputText:
    text: https://getsamplefiles.com/download/pdf/sample-1.pdf
    target: Address bar
    locator:
      name: Address and search bar
      controlType: Edit
- pressKey: Enter
- assertWithAI:
    prompt: Verify that the Downloads page appears
    optional: false
    timeout: 30000
- tapOn:
    target: '"Open file" for "sample-1.pdf"'
    locator:
      name: sample-1.pdf
    timeout: 10000
- assertVisible:
    target: downloaded file "sample-1.pdf" should be opened in a new tab
    locator:
      name: sample-1.pdf
      controlType: TabItem
    timeout: 10000
    optional: false
- killApp
