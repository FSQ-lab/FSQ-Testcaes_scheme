schemaVersion: fsq.ai-test/v1
name: Download a file
description: Converted from Edge Windows Behave BDD scenario.
platform: windows
app:
  name: edge
  exe: C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe
  windowTitleRegex: .*Microsoft Edge.*
runner:
  backend: pywinauto-mcp
tags:
- downloads
- smoke
- p0
- codex-converted
---
- launchApp
- tapOn:
    target: Address bar
    locator:
      name: Address and search bar
      controlType: Edit
    timeout: 10000
- inputText:
    text: https://getsamplefiles.com/download/pdf/sample-1.pdf
    target: Address bar
    locator:
      name: Address and search bar
      controlType: Edit
- pressKey: Enter
- assertVisible:
    target: Downloads panel should appear
    locator:
      name: Downloads
      controlType: Window
    timeout: 10000
    optional: false
- tapOn:
    target: Address bar
    locator:
      name: Address and search bar
      controlType: Edit
    timeout: 10000
- inputText:
    text: edge://downloads
    target: Address bar
    locator:
      name: Address and search bar
      controlType: Edit
- pressKey: Enter
- assertVisible:
    target: '"sample-1.pdf" should appear in download list'
    locator:
      name: sample-1.pdf
    timeout: 10000
    optional: false
- killApp
