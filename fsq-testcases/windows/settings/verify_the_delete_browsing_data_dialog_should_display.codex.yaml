schemaVersion: fsq.ai-test/v1
name: Verify the Delete browsing data dialog should display
description: Converted from Edge Windows Behave BDD scenario.
platform: windows
app:
  name: edge
  exe: C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe
  windowTitleRegex: .*Microsoft Edge.*
runner:
  backend: pywinauto-mcp
tags:
- settings
- smoke
- p0
- codex-converted
---
- launchApp
- tapOn:
    target: '"Settings and more" button on toolbar'
    locator:
      name: Settings and more
      controlType: Button
    timeout: 10000
- tapOn:
    target: select "Settings" button from the dropdown menu
- assertVisible:
    target: settings page should be opened
    locator:
      name: Settings
      controlType: Text
    timeout: 10000
    optional: false
- tapOn:
    target: '"Privacy, search, and services"'
    locator:
      name: Privacy, search, and services
      controlType: RadioButton
    timeout: 10000
- tapOn:
    target: the "Clear browsing data" button under Privacy, search, and services
    locator:
      name: Clear browsing data
      controlType: Button
    timeout: 10000
- tapOn:
    target: the "Choose what to clear" button
    locator:
      name: Choose what to clear
      controlType: Button
    timeout: 10000
- assertVisible:
    target: '"Delete browsing data" dialog should display'
    locator:
      name: Delete browsing data
      controlType: Window
    timeout: 10000
    optional: false
- killApp
