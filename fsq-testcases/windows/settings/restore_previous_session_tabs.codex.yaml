schemaVersion: fsq.ai-test/v1
name: Restore previous session tabs
description: Converted from Edge Windows Behave BDD scenario.
platform: windows
app:
  name: edge
  exe: C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe
  windowTitleRegex: .*Microsoft Edge.*
runner:
  backend: pywinauto-mcp
tags:
- settings
- smoke
- p0
- codex-converted
---
- launchApp
- tapOn:
    target: '"Settings and more" button on toolbar'
    locator:
      name: Settings and more
      controlType: Button
    timeout: 10000
- tapOn:
    target: select "Settings" button from the dropdown menu
- assertVisible:
    target: settings page should be opened
    locator:
      name: Settings
      controlType: Text
    timeout: 10000
    optional: false
- tapOn:
    target: '"Start, home, and new tab page"'
- tapOn:
    target: select the option "Open tabs from the previous session"
    locator:
      name: Open tabs from the previous session
      controlType: RadioButton
    timeout: 10000
- assertVisible:
    target: option "Open tabs from the previous session" should be selected successfully
    locator:
      name: Open tabs from the previous session
      controlType: RadioButton
    timeout: 10000
    optional: false
- tapOn:
    target: open a new tab
    locator:
      name: New Tab
      controlType: Button
    timeout: 10000
- tapOn:
    target: Address bar
    locator:
      name: Address and search bar
      controlType: Edit
    timeout: 10000
- inputText:
    text: https://www.bbc.com
    target: Address bar
    locator:
      name: Address and search bar
      controlType: Edit
- pressKey: Enter
- tapOn:
    target: open a new tab
    locator:
      name: New Tab
      controlType: Button
    timeout: 10000
- tapOn:
    target: Address bar
    locator:
      name: Address and search bar
      controlType: Edit
    timeout: 10000
- inputText:
    text: https://www.apple.com
    target: Address bar
    locator:
      name: Address and search bar
      controlType: Edit
- pressKey: Enter
- tapOn:
    target: close and restart Edge
- assertVisible:
    target: previously "https://www.bbc.com" and "https://www.apple.com" tabs should
      be opened
    locator:
      name: BBC Home
      controlType: TabItem
    timeout: 10000
    optional: false
- killApp
