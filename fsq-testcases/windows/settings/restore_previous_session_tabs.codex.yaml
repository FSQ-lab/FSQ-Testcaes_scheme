schemaVersion: fsq.ai-test/v1
name: Restore previous session tabs
description: Converted from Edge Windows Behave BDD scenario.
platform: windows
app:
  name: edge
  exe: C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe
  windowTitleRegex: .*Microsoft Edge.*
runner:
  backend: pywinauto-mcp
tags:
- settings
- smoke
- p0
- codex-converted
---
- launchApp
- tapOn:
    target: Settings and more button on toolbar
    locator:
      name: Settings and more
      controlType: Button
- tapOn:
    target: Settings button from dropdown menu
    locator:
      name: Settings
      controlType: MenuItem
- assert:
    url:
      contains: edge://settings
    optional: false
- tapOn:
    target: Start, home, and new tab page
- tapOn:
    target: Open tabs from the previous session option
- assertVisible:
    target: Open tabs from the previous session option selected
- tapOn:
    target: New Tab button
    locator:
      name: New Tab
      controlType: Button
- tapOn:
    target: Address bar
    locator:
      name: Address and search bar
      controlType: Edit
    timeout: 10000
- pressKey:
    key: A
    modifiers:
    - Control
- inputText:
    text: https://www.bbc.com
    target: Address bar
    locator:
      name: Address and search bar
      controlType: Edit
- pressKey: Enter
- waitUntil:
    url:
      contains: bbc.com
    timeout: 30000
    optional: false
- tapOn:
    target: New Tab button
    locator:
      name: New Tab
      controlType: Button
- tapOn:
    target: Address bar
    locator:
      name: Address and search bar
      controlType: Edit
    timeout: 10000
- pressKey:
    key: A
    modifiers:
    - Control
- inputText:
    text: https://www.apple.com
    target: Address bar
    locator:
      name: Address and search bar
      controlType: Edit
- pressKey: Enter
- waitUntil:
    url:
      contains: apple.com
    timeout: 30000
    optional: false
- stopApp
- launchApp
- assertWithAI:
    prompt: Verify previously opened BBC and Apple tabs are restored after Edge restarts.
    optional: false
    timeout: 30000
- killApp
