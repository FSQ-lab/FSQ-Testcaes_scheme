schemaVersion: fsq.ai-test/v1
name: Show or hide Downloads button on toolbar
description: Converted from Edge Windows Behave BDD scenario.
platform: windows
app:
  name: edge
  exe: C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe
  windowTitleRegex: .*Microsoft Edge.*
runner:
  backend: pywinauto-mcp
tags:
- regression
- p0
- settings
- codex-converted
---
- launchApp
- tapOn:
    target: '"Settings and more" button on toolbar'
    locator:
      name: Settings and more
      controlType: Button
    timeout: 10000
- tapOn:
    target: select "Settings" button from the dropdown menu
- assertVisible:
    target: settings page should be opened
    locator:
      name: Settings
      controlType: Text
    timeout: 10000
    optional: false
- tapOn:
    target: '"Appearance"'
    locator:
      name: Appearance
      controlType: RadioButton
    timeout: 10000
- tapOn:
    target: the option "Page zoom" button under "Appearance"
    locator:
      name: Page zoom
      controlType: Button
    timeout: 10000
- tapOn:
    target: '"Toolbar" in the webpage'
    locator:
      name: Toolbar
      controlType: Button
    timeout: 10000
- tapOn:
    target: '"Downloads" button on the settings page to turn it on'
    locator:
      name: Downloads
      controlType: Button
    timeout: 10000
- assertVisible:
    target: Downloads button should be visible on the toolbar
    locator:
      name: Downloads
      controlType: Button
    timeout: 10000
    optional: false
- tapOn:
    target: '"Downloads" button on the settings page to turn it off'
    locator:
      name: Downloads
      controlType: Button
    timeout: 10000
- assertNotVisible:
    target: Downloads button should be hidden on the toolbar
    locator:
      name: Downloads
      controlType: Button
    timeout: 10000
    optional: false
- killApp
