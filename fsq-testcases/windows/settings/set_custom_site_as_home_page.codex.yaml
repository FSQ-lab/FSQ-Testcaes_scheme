schemaVersion: fsq.ai-test/v1
name: Set custom site as home page
description: Converted from Edge Windows Behave BDD scenario.
platform: windows
app:
  name: edge
  exe: C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe
  windowTitleRegex: .*Microsoft Edge.*
runner:
  backend: pywinauto-mcp
tags:
- settings
- smoke
- p0
- codex-converted
---
- launchApp
- tapOn:
    target: '"Settings and more" button on toolbar'
    locator:
      name: Settings and more
      controlType: Button
    timeout: 10000
- tapOn:
    target: select "Settings" button from the dropdown menu
- assertVisible:
    target: settings page should be opened
    locator:
      name: Settings
      controlType: Text
    timeout: 10000
    optional: false
- tapOn:
    target: '"Start, home, and new tab page"'
- tapOn:
    target: turn on the option "show home button on the toolbar"
    locator:
      name: Show home button on the toolbar
      controlType: Button
    timeout: 10000
- tapOn:
    target: select the option "Set custom site"
- assertVisible:
    target: input box under "Set custom site" can be clicked
    locator:
      automationId: control
      controlType: Edit
    timeout: 10000
    optional: false
- tapOn:
    target: Address bar
    locator:
      name: Address and search bar
      controlType: Edit
    timeout: 10000
- inputText:
    text: https://www.apple.com
    target: Address bar
    locator:
      name: Address and search bar
      controlType: Edit
- pressKey: Enter
- tapOn:
    target: select the option "Set custom site"
- tapOn:
    target: '"Home" button to the left of the address bar'
    locator:
      name: Home
      controlType: Button
    timeout: 10000
- assert:
    element:
      name: https://www.apple.com
      controlType: Edit
    text:
      contains: https://www.apple.com
    optional: false
- killApp
