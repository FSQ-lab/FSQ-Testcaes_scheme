schemaVersion: fsq.ai-test/v1
name: Show and hide Home button
description: Converted from Edge Windows Behave BDD scenario.
platform: windows
app:
  name: edge
  exe: C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe
  windowTitleRegex: .*Microsoft Edge.*
runner:
  backend: pywinauto-mcp
tags:
- regression
- p0
- settings
- codex-converted
---
- launchApp
- tapOn:
    target: '"Settings and more" button on toolbar'
    locator:
      name: Settings and more
      controlType: Button
    timeout: 10000
- tapOn:
    target: select "Settings" button from the dropdown menu
- assertVisible:
    target: settings page should be opened
    locator:
      name: Settings
      controlType: Text
    timeout: 10000
    optional: false
- tapOn:
    target: '"Start, home, and new tab page"'
- tapOn:
    target: '"Home" button on the settings page'
    locator:
      name: Show home button on the toolbar
      controlType: Button
    timeout: 10000
- assertVisible:
    target: Home button should be visible on the toolbar
    locator:
      name: Home
      controlType: Button
    timeout: 10000
    optional: false
- tapOn:
    target: '"Home" button on the settings page'
    locator:
      name: Show home button on the toolbar
      controlType: Button
    timeout: 10000
- assertNotVisible:
    target: Home button should be invisible on the toolbar
    locator:
      name: Home
      controlType: Button
    timeout: 10000
    optional: false
- killApp
