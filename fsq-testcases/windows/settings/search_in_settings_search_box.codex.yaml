schemaVersion: fsq.ai-test/v1
name: Search in settings search box
description: Converted from Edge Windows Behave BDD scenario.
platform: windows
app:
  name: edge
  exe: C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe
  windowTitleRegex: .*Microsoft Edge.*
runner:
  backend: pywinauto-mcp
tags:
- settings
- smoke
- p0
- codex-converted
---
- launchApp
- tapOn:
    target: '"Settings and more" button on toolbar'
    locator:
      name: Settings and more
      controlType: Button
    timeout: 10000
- tapOn:
    target: select "Settings" button from the dropdown menu
- assertVisible:
    target: settings page should be opened
    locator:
      name: Settings
      controlType: Text
    timeout: 10000
    optional: false
- tapOn:
    target: input "Privacy" in the settings search box
- assertVisible:
    target: search results should display relevant settings related to "Privacy"
    locator:
      name: Select your privacy settings
      controlType: Text
    timeout: 10000
    optional: false
- tapOn:
    target: clear the search box
    locator:
      name: Clear search
      controlType: Button
    timeout: 10000
- assert:
    element:
      name: edge://settings/profiles
      controlType: Edit
    text:
      contains: edge://settings/profiles
    optional: false
- tapOn:
    target: input "123" in the settings search box
- assertVisible:
    target: search results should display "No search results found"
    locator:
      name: No search results found
      controlType: Text
    timeout: 10000
    optional: false
- killApp
