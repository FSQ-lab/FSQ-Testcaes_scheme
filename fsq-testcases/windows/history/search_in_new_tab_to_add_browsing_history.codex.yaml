schemaVersion: fsq.ai-test/v1
name: Search in new tab to add browsing history
description: Converted from Edge Windows Behave BDD scenario.
platform: windows
app:
  name: edge
  exe: C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe
  windowTitleRegex: .*Microsoft Edge.*
runner:
  backend: pywinauto-mcp
tags:
- p0
- history
- codex-converted
---
- launchApp
- tapOn:
    target: Address bar
    locator:
      name: Address and search bar
      controlType: Edit
    timeout: 10000
- inputText:
    text: https://www.cgtn.com
    target: Address bar
    locator:
      name: Address and search bar
      controlType: Edit
- pressKey: Enter
- assertVisible:
    target: '"cgtn" website should be opnened'
    locator:
      name: CGTN
      controlType: Document
    timeout: 10000
    optional: false
- pressKey: Ctrl+H
- tapOn:
    target: search "cgtn" in history hub
- assertVisible:
    target: '"cgtn" website should be displayed in the history hub'
    locator:
      name: CGTN
      controlType: TreeItem
    timeout: 10000
    optional: false
- killApp
