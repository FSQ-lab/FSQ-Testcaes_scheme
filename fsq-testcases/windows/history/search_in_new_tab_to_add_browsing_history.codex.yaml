schemaVersion: fsq.ai-test/v1
name: Search in new tab to add browsing history
description: Converted from Edge Windows Behave BDD scenario.
platform: windows
app:
  name: edge
  exe: C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe
  windowTitleRegex: .*Microsoft Edge.*
runner:
  backend: pywinauto-mcp
tags:
- p0
- history
- codex-converted
---
- launchApp
- tapOn:
    target: New Tab button
    locator:
      name: New Tab
      controlType: Button
- tapOn:
    target: Address bar
    locator:
      name: Address and search bar
      controlType: Edit
    timeout: 10000
- pressKey:
    key: A
    modifiers:
    - Control
- inputText:
    text: https://www.cgtn.com
    target: Address bar
    locator:
      name: Address and search bar
      controlType: Edit
- pressKey: Enter
- waitUntil:
    url:
      contains: cgtn.com
    timeout: 30000
    optional: false
- pressKey:
    key: H
    modifiers:
    - Control
- assertVisible:
    target: history hub
- tapOn:
    target: Search history box in history hub
- inputText:
    text: cgtn
    target: Search history box in history hub
- assertVisible:
    target: cgtn website in the history hub
