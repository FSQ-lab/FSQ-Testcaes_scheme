schemaVersion: fsq.ai-test/v1
name: Click the History button on toolbar to open History pane
description: Converted from Edge Windows Behave BDD scenario.
platform: windows
app:
  name: edge
  exe: C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe
  windowTitleRegex: .*Microsoft Edge.*
runner:
  backend: pywinauto-mcp
tags:
- p0
- history
- codex-converted
---
- launchApp
- tapOn:
    target: '"···" button in toolbar'
    locator:
      name: Settings and more (Alt+F)
      controlType: Button
    timeout: 10000
- rightClickOn:
    target: right "History" button in the menu
    locator:
      name: History Ctrl+H
      controlType: MenuItem
    timeout: 10000
- tapOn:
    target: '"Show in toolbar" in menu'
    locator:
      name: Show in toolbar
      controlType: MenuItem
    timeout: 10000
- assertVisible:
    target: History button should be displayed in the toolbar
    locator:
      name: History
      controlType: Button
    timeout: 10000
    optional: false
- tapOn:
    target: '"History" button in the toolbar'
    locator:
      name: History
      controlType: Button
    timeout: 10000
- assertVisible:
    target: '"history hub" should be displayed'
    locator:
      name: History
      controlType: Window
    timeout: 10000
    optional: false
- killApp
